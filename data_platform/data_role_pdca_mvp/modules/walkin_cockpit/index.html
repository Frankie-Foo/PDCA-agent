  <script>
(function () {
  const StoreClass = { CLASS_1: 'Class 1', CLASS_2: 'Class 2' };

  /** 离线兜底：不再使用国内门店 demo，需加载 data/walkin-YYYY-MM.json */
  const FALLBACK_STORES = [];
  const FALLBACK_STAFF = [];

  var mockStores = FALLBACK_STORES;
  var mockStaff = FALLBACK_STAFF;

  /** 实时接口：同域走相对路径；file:// 默认连本机 API（npm run walkin:api） */
  var WALKIN_API_BASE = (function () {
    var q = new URLSearchParams(location.search).get('api');
    if (q) return String(q).replace(/\/$/, '');
    if (location.protocol === 'http:' || location.protocol === 'https:') return '';
    return 'http://127.0.0.1:3780';
  })();

  function walkinApiUrl(ym) {
    var b = WALKIN_API_BASE;
    return (b ? b : '') + '/api/walkin?month=' + encodeURIComponent(ym);
  }

  function walkinStaticUrl(ym) {
    return 'data/walkin-' + ym + '.json';
  }

  var walkinPollTimer = null;

  const state = {
    activeTab: 'dashboard',
    globalSearch: '',
    storeRegionFilter: 'All',
    storeFilterId: 'All',
    staffFilterId: 'All',
    storeTypeFilter: 'All',
    anomalyOnly: false,
    selectedMonth: '2026-06',
    dateRange: { start: '2026-06-01', end: '2026-06-30' },
    isCustomDate: false,
    periodKey: 'month',
    modal: { open: false, title: '', loading: false, content: '' },
    dataSource: 'loading',
    dataSourceDetail: '正在尝试读取 data/walkin-dashboard.json …',
    walkinBasics: null,
    fiveKit: null,
    realActivation: null,
  };

  function computeWalkinBasicsHtml(stores, staff) {
    function pn() {
      var a = arguments;
      for (var i = 0; i < a.length; i++) {
        if (a[i] != null && a[i] !== '') {
          var n = Number(a[i]);
          if (!isNaN(n)) return n;
        }
      }
      return 0;
    }
    var walkinGroups = stores.reduce(function (x, s) {
      return x + pn(s.totalVisitGroups);
    }, 0);
    function sumSS(sk, skSt) {
      var sv = stores.reduce(function (x, s) {
        return x + pn(s[sk]);
      }, 0);
      if (sv > 0) return sv;
      return staff.reduce(function (x, s) {
        return x + pn(s[skSt]);
      }, 0);
    }
    var dealGroups = sumSS('dealGroups', 'dealGroups');
    var walkinPeople = sumSS('walkinPeople', 'walkinPeople');
    var wechatAdd = sumSS('wechatAddCount', 'wechatAddCount');
    var effC = sumSS('effectiveCustomers', 'effectiveCustomers');
    var effA = sumSS('effectiveAdded', 'effectiveAdded');
    var activationCnt = sumSS('activationQty', 'activationQty');
    var offsiteActivationCnt = sumSS('offsiteActivationQty', 'offsiteActivationQty');
    var touchCnt = sumSS('touchCount', 'touchCount');
    var useCnt = sumSS('useCount', 'useCount');
    var dealWan =
      Math.round(
        (stores.reduce(function (x, s) {
          return x + pn(s.totalSalesAmount);
        }, 0) /
          10000) *
          10
      ) / 10;
    var pct = function (n, d) {
      return d > 0 ? Math.round((1000 * n) / d) / 10 : 0;
    };
    var addW = 0;
    for (var si = 0; si < stores.length; si++) {
      var s = stores[si];
      addW += pn(s.totalVisitGroups) * pn(s.avgAddRate);
    }
    var addedGrp = Math.round(addW);
    var totalSalesAmt = stores.reduce(function (x, s) {
      return x + pn(s.totalSalesAmount);
    }, 0);
    var estParts = [];
    if (walkinPeople <= 0 && walkinGroups > 0) {
      walkinPeople = Math.round(walkinGroups * 1.66);
      estParts.push('进店人数按约1.66人/组估算（缺画像字段时）');
    }
    if (wechatAdd <= 0 && walkinGroups > 0) {
      if (addedGrp > 0) {
        wechatAdd = addedGrp;
        estParts.push('微信添加按各店组×组添加率聚合估算');
      } else if (walkinPeople > 0) {
        wechatAdd = Math.round(walkinPeople * 0.3);
        estParts.push('微信添加按进店人数比例粗估');
      }
    }
    if (dealGroups <= 0 && totalSalesAmt > 0 && walkinGroups > 0) {
      var aovSum = 0;
      var aovN = 0;
      for (var ai = 0; ai < staff.length; ai++) {
        var stf = staff[ai];
        var ms = pn(stf.monthlySales);
        if (ms > 0) {
          aovSum += ms;
          aovN++;
        }
      }
      var aov = aovN > 0 ? aovSum / aovN : 42000;
      if (aov < 15000) aov = 15000;
      if (aov > 200000) aov = 200000;
      dealGroups = Math.min(walkinGroups, Math.max(0, Math.round(totalSalesAmt / aov)));
      if (dealGroups > 0) estParts.push('成交组数按销额÷导购件均粗估（缺画像字段时）');
    }
    if (effC <= 0 && walkinPeople > 0) {
      effC = Math.round(walkinPeople * 0.41);
      estParts.push('有效客户按进店人数约41%估算');
    }
    if (effA <= 0 && effC > 0) {
      effA = Math.round(effC * 0.79);
      estParts.push('已添加有效按有效客户约79%估算');
    }
    // 激活数 / 异地激活数不再用公式估算（此前 8.5%/6.2% 是纯拍脑袋的假数据）；
    // 改由 renderWalkinBasicsBlock 直接读取 state.realActivation（/api/vps/dealer-activation
    // 真实数据，来自 mobile.activation.report），此处两个字段仅作占位。
    var denomPeople = walkinPeople > 0 ? walkinPeople : walkinGroups;
    var touchRatePct = pct(touchCnt, denomPeople);
    var useRatePct = pct(useCnt, denomPeople);
    if (touchCnt <= 0 && walkinGroups > 0) {
      var tw = 0;
      for (var tj = 0; tj < stores.length; tj++) {
        var st = stores[tj];
        tw += pn(st.totalVisitGroups) * pn(st.avgTouchRate);
      }
      touchRatePct = Math.round((1000 * tw) / walkinGroups) / 10;
    }
    if (useCnt <= 0 && walkinGroups > 0) {
      var uw = 0;
      for (var uj = 0; uj < stores.length; uj++) {
        var su = stores[uj];
        uw += pn(su.totalVisitGroups) * pn(su.avgUseRate);
      }
      useRatePct = Math.round((1000 * uw) / walkinGroups) / 10;
    }
    return {
      walkinGroups: walkinGroups,
      dealGroups: dealGroups,
      walkinPeople: walkinPeople,
      wechatAdd: wechatAdd,
      effectiveCustomers: effC,
      effectiveAdded: effA,
      activationCnt: activationCnt,
      offsiteActivationCnt: offsiteActivationCnt,
      touchRatePct: touchRatePct,
      useRatePct: useRatePct,
      groupAddRatePct: pct(addedGrp, walkinGroups),
      dealRatePct: pct(dealGroups, walkinGroups),
      wechatRatePct: pct(wechatAdd, walkinPeople),
      validToAddedPct: pct(effA, effC),
      activationRatePct: pct(activationCnt, wechatAdd > 0 ? wechatAdd : effA),

        estParts.length > 0

          : '',
    };

  function renderDonut() {
    var data = [
      { name: '1-3日已触达', value: 85, color: '#10b981' },
      { name: '7日已触达', value: 65, color: '#2d7a62' },
      { name: '14日+已触达', value: 45, color: '#f59e0b' },
      { name: '待触达/异常', value: 15, color: '#f43f5e' },
    ];
    var total = data.reduce(function (a, d) { return a + d.value; }, 0);
    var cx = 90;
    var cy = 90;
    var r = 52;
    var ir = 36;
    var start = -Math.PI / 2;
    var paths = '';
    for (var i = 0; i < data.length; i++) {
      var frac = data[i].value / total;
      var end = start + frac * 2 * Math.PI;
      var x1 = cx + r * Math.cos(start);
      var y1 = cy + r * Math.sin(start);
      var x2 = cx + r * Math.cos(end);
      var y2 = cy + r * Math.sin(end);
      var x1i = cx + ir * Math.cos(start);
      var y1i = cy + ir * Math.sin(start);
      var x2i = cx + ir * Math.cos(end);
      var y2i = cy + ir * Math.sin(end);
      var large = end - start > Math.PI ? 1 : 0;
      paths +=
        '<path d="M ' +
        x1 +
        ' ' +
        y1 +
        ' A ' +
        r +
        ' ' +
        r +
        ' 0 ' +
        large +
        ' 1 ' +
        x2 +
        ' ' +
        y2 +
        ' L ' +
        x2i +
        ' ' +
        y2i +
        ' A ' +
        ir +
        ' ' +
        ir +
        ' 0 ' +
        large +
        ' 0 ' +
        x1i +
        ' ' +
        y1i +
        ' Z" fill="' +
        data[i].color +
        '" stroke="#fff" stroke-width="2"/>';
      start = end;
    }
    return (
      '<svg viewBox="0 0 180 180" width="100%" height="100%">' +
      paths +
      '</svg>'
    );
  }

  function sparkline(vals, stroke) {
    var w = 64;
    var h = 32;
    var max = Math.max.apply(null, vals.concat([1]));
    var min = Math.min.apply(null, vals.concat([0]));
    var range = max - min || 1;
    var pts = vals
      .map(function (v, i) {
        var x = (i / (vals.length - 1 || 1)) * (w - 4) + 2;
        var y = h - 2 - ((v - min) / range) * (h - 4);
        return x + ',' + y;
      })
      .join(' ');
    return (
      '<svg width="' +
      w +
      '" height="' +
      h +
      '" viewBox="0 0 ' +
      w +
      ' ' +
      h +
      '"><polyline fill="none" stroke="' +
      stroke +
      '" stroke-width="2" points="' +
      pts +
      '"/></svg>'
    );
  }

  function getAiAlertBuckets(maxLow, maxNoDeal, maxStaff) {
    var ml = maxLow == null ? 8 : maxLow;
    var mn = maxNoDeal == null ? 8 : maxNoDeal;
    var ms = maxStaff == null ? 12 : maxStaff;
    var lowAdd = mockStores
      .filter(function (s) {
        return (s.avgAddRate || 0) < 0.35 && (s.totalVisitGroups || 0) >= 5;
      })
      .slice()
      .sort(function (a, b) {
        return (a.avgAddRate || 0) - (b.avgAddRate || 0);
      })
      .slice(0, ml);
    var noDeal = mockStores
      .filter(function (s) {
        var g = s.totalVisitGroups || 0;
        var sales = s.totalSalesAmount || 0;
        return g >= 12 && (!sales || sales === 0);
      })
      .slice(0, mn);
    var anomStaff = mockStaff
      .filter(function (s) {
        return s.anomalies && s.anomalies.length;
      })
      .slice()
      .sort(function (a, b) {
        return (b.visitGroups || 0) - (a.visitGroups || 0);
      })
      .slice(0, ms);
    return { lowAdd: lowAdd, noDeal: noDeal, anomStaff: anomStaff };
  }

    var parts = [];
    if (lowAdd.length) {
      parts.push(
        '组添加率低于35%且接待不少于5组：' +

    if (anomStaff.length) {

                '）'
              );

            .join('；') +

    if (!parts.length) {
      parts.push(
        '当前窗口未命中「低于35%添加率」「高接待零成交」「导购异常标签」等组合规则；可结合门店柱状图与名单下钻持续关注。'

    var coreHtml =

    var actions = [];
    if (lowAdd.length) actions.push('对低添加率门店抽查一周添加凭证与培训');

      '<h4 class="text-sm font-bold mb-2" style="color:#1a3c34">核心提醒</h4>' +

  function renderPersonalStoreOverview() {
    var stores = mockStores.filter(function (s) {
      if (state.storeRegionFilter !== 'All' && s.region !== state.storeRegionFilter) return false;
      if (state.storeFilterId !== 'All' && s.id !== state.storeFilterId) return false;
      return true;
    });
    var rows = stores.map(function (store) {
      var people = mockStaff.filter(function (m) {
        return m.storeId === store.id;
      });
      var total = people.length;
      var anom = people.filter(function (m) {
        return m.anomalies && m.anomalies.length > 0;
      }).length;
      var rate = total > 0 ? Math.round((1000 * anom) / total) / 10 : 0;
      return { store: store, total: total, anom: anom, rate: rate };
    });
    rows.sort(function (a, b) {
      if (b.rate !== a.rate) return b.rate - a.rate;
      if (b.anom !== a.anom) return b.anom - a.anom;
      return String(a.store.name).localeCompare(String(b.store.name), 'zh-CN');
    });
    var sumSt = rows.length;
    var sumP = 0;
    var sumA = 0;
    for (var ri = 0; ri < rows.length; ri++) {
      sumP += rows[ri].total;
      sumA += rows[ri].anom;
    }
    var gRate = sumP > 0 ? Math.round((1000 * sumA) / sumP) / 10 : 0;
    var cards = rows
      .map(function (r) {
        var sk = r.rate >= 30 ? 'pm-risk-high' : r.rate >= 10 ? 'pm-risk-mid' : 'pm-risk-low';
        var br = r.rate >= 30 ? 'pm-bar-warn' : r.rate >= 10 ? 'pm-bar-mid' : '';
        var rw = Math.min(100, r.rate);
        var tip = r.store.name + ' · 在册 ' + r.total + ' 人 · 异常 ' + r.anom + ' 人 · 异常率 ' + r.rate + '%';
        return (
          '<div class="pm-store-card ' +
          sk +
          '" title="' +
          escSvgTitle(tip) +
          '">' +
          '<div class="pm-store-name">' +
          escapeHtml(r.store.name) +
          '</div>' +
          '<div class="pm-store-meta">' +
          escapeHtml(r.store.region) +
          ' · ' +
          escapeHtml(r.store.class || '') +
          '</div>' +
          '<div class="pm-store-stats">' +
          '<div class="pm-stat-block"><div class="pm-stat-num">' +
          r.total +
          '</div><div class="pm-stat-lab">在册人数</div></div>' +
          '<div class="pm-stat-block"><div class="pm-stat-num ' +
          (r.anom > 0 ? 'pm-warn' : '') +
          '">' +
          r.anom +
          '</div><div class="pm-stat-lab">异常人数</div></div></div>' +
          '<div class="pm-rate-wrap">' +
          '<div class="pm-rate-row"><span style="font-size:0.7rem;font-weight:700;color:#64748b">异常率</span><span class="pm-rate-val" style="color:' +
          (r.rate >= 30 ? '#e11d48' : r.rate >= 10 ? '#b45309' : '#64748b') +
          '">' +
          r.rate +
          '%</span></div>' +
          '<div class="pm-rate-bar ' +
          br +
          '"><i style="width:' +
          rw +
          '%"></i></div></div></div>'
        );
      })
      .join('');
    return (
      '<div class="pm-overview mb-1">' +
      '<div class="flex flex-wrap items-start justify-between gap-4">' +
      '<div>' +
      '<h3 class="text-sm font-bold text-slate-800 tracking-tight">团队编制与异常一览</h3>' +
      '<p class="text-xs text-slate-500 mt-1 max-w-xl">与下方「区域 / 代理商」筛选项联动，按限定范围汇总在册人数与异常占比；与搜索及「仅高风险」独立。</p></div>' +
      '<div class="pm-overview-kpi">' +
      '<div class="pm-overview-kpi-item"><div class="pm-kpi-val">' +
      sumSt +
      '</div><div class="pm-kpi-lab">代理商</div></div>' +
      '<div class="pm-overview-kpi-item"><div class="pm-kpi-val">' +
      sumP +
      '</div><div class="pm-kpi-lab">在册人数</div></div>' +
      '<div class="pm-overview-kpi-item"><div class="pm-kpi-val" style="color:#e11d48">' +
      sumA +
      '</div><div class="pm-kpi-lab">异常人数</div></div>' +
      '<div class="pm-overview-kpi-item"><div class="pm-kpi-val" style="color:' +
      (gRate >= 30 ? '#e11d48' : gRate >= 10 ? '#b45309' : '#059669') +
      '">' +
      gRate +
      '%</div><div class="pm-kpi-lab">总异常率</div></div></div></div>' +
      (rows.length

  function bind() {
    document.querySelectorAll('.import-dashboard-json').forEach(function (inp) {
      inp.addEventListener('change', function (ev) {
        var f = ev.target.files && ev.target.files[0];
        if (!f) return;
        var fr = new FileReader();
        fr.onload = function () {
          try {
            var j = JSON.parse(String(fr.result));
            stopWalkinPoll();
            if (applyWalkinBundle(j, 'file')) {
              state.dataSourceDetail =
                '已从「' + f.name + '」导入 · ' + state.dataSourceDetail.replace(/^已从文件导入 · /, '');
            } else {
              state.dataSourceDetail = '「' + f.name + '」内容无效，未替换数据。';
            }
          } catch (e2) {
            state.dataSource = 'demo';
            state.dataSourceDetail = 'JSON 解析失败：' + (e2 && e2.message ? e2.message : '格式错误');
          }
          render();
        };
        fr.readAsText(f, 'utf-8');
        inp.value = '';
      });
    });
    document.querySelectorAll('[data-tab]').forEach(function (el) {
      el.addEventListener('click', function () {
        state.activeTab = el.getAttribute('data-tab');
        render();
      });
    });
    var gs = document.querySelector('.global-search');
    if (gs) {
      gs.addEventListener('input', function () {
        state.globalSearch = gs.value;
        render();
      });
    }
    var cs = document.querySelector('.clear-search');
    if (cs) {
      cs.addEventListener('click', function () {
        state.globalSearch = '';
        render();
      });
    }
    var fm = document.querySelector('.filter-month');
    if (fm) {
      fm.addEventListener('change', function () {
        if (fm.value === 'custom') {
          state.isCustomDate = true;
          render();
          return;
        }
        state.isCustomDate = false;
        state.selectedMonth = fm.value;
        if (/^\d{4}-\d{2}$/.test(fm.value)) {
          loadWalkinMonth(fm.value, false);
          return;
        }
        if (fm.value === '2026-Q1') {
          loadWalkinBundleUrl('data/walkin-2026-Q1.json', '2026-Q1', { start: '2026-01-01', end: '2026-03-31' });
          return;
        }
        render();
      });
    }
    var ds = document.querySelector('.filter-date-start');
    if (ds) {
      ds.addEventListener('change', function () {
        state.dateRange.start = ds.value;
        applyCustomDateRange();
      });
    }
    var de = document.querySelector('.filter-date-end');
    if (de) {
      de.addEventListener('change', function () {
        state.dateRange.end = de.value;
        applyCustomDateRange();
      });
    }
    bindSelect('.filter-region', function (v) {
      state.storeRegionFilter = v;
      state.storeFilterId = 'All';
    });
    bindSelect('.filter-store-id', function (v) {
      state.storeFilterId = v;
    });
    bindSelect('.filter-store-type', function (v) {
      state.storeTypeFilter = v;
    });
    bindCheckbox('.filter-anomaly-only', function (c) {
      state.anomalyOnly = c;
    });
    bindSelect('.filter-region-p', function (v) {
      state.storeRegionFilter = v;
      state.storeFilterId = 'All';
      state.staffFilterId = 'All';
    });
    bindSelect('.filter-store-id-p', function (v) {
      state.storeFilterId = v;
      state.staffFilterId = 'All';
    });
    bindSelect('.filter-staff-id', function (v) {
      state.staffFilterId = v;
    });
    bindCheckbox('.filter-anomaly-only-p', function (c) {
      state.anomalyOnly = c;
    });
    document.querySelectorAll('[data-close-modal]').forEach(function (el) {
      el.addEventListener('click', closeModal);
    });
    var dab = document.querySelector('.data-ai-dash');
    if (dab) {
      dab.addEventListener('click', function () {
        openAnalysis('全店业绩异常分析', storeRankingData());
      });
    }
    var dac = document.querySelector('.data-ai-crm');
    if (dac) {
      dac.addEventListener('click', function () {
        openAnalysis('CRM 触达模型分析', {});
      });
    }
    var dar = document.querySelector('.data-ai-daily-anomaly-report');
    if (dar) {
      dar.addEventListener('click', function () {
        openAnalysis('今日 Walk-in 异常报告', getAiAlertBuckets(8, 6, 16));
      });
    }
    document.querySelectorAll('.data-ai-staff').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-staff-id');
        var staff = mockStaff.find(function (s) {
          return s.id === id;
        });
        if (staff) openAnalysis(staff.name + ' 个案诊断', staff);
      });
    });
    document.querySelectorAll('.data-store-ai').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-store-id');
        var store = mockStores.find(function (s) {
          return s.id === id;
        });
        if (store) openAnalysis(store.name + ' 异常预警', store);
      });
    });
    document.querySelectorAll('.data-personal-ai').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-staff-id');
        var staff = mockStaff.find(function (s) {
          return s.id === id;
        });
        if (staff) openAnalysis(staff.name + ' 个案深度分析', staff);
      });
    });
  }

  function bindSelect(sel, fn) {
    var el = document.querySelector(sel);
    if (!el) return;
    el.addEventListener('change', function () {
      fn(el.value);
      render();
    });
  }

  function bindCheckbox(sel, fn) {
    var el = document.querySelector(sel);
    if (!el) return;
    el.addEventListener('change', function () {
      fn(el.checked);
      render();
    });
  }

  function stopWalkinPoll() {
    if (walkinPollTimer) {
      clearInterval(walkinPollTimer);
      walkinPollTimer = null;
    }
  }

  function startWalkinPoll() {
    stopWalkinPoll();
    walkinPollTimer = setInterval(function () {
      if (!state.isCustomDate && /^\d{4}-\d{2}$/.test(state.selectedMonth)) {
        loadWalkinMonth(state.selectedMonth, true);
      }
    }, 45000);
  }

  function applyWalkinBundle(j, source) {
    if (!(j.stores && j.stores.length && j.staff && j.staff.length)) {
      state.dataSource = 'demo';
      state.dataSourceDetail = 'JSON 无有效 stores/staff。';
      state.walkinBasics = null;
      return false;
    }
    var teamCfg = { hanTeamUserIds: [], liuTeamUserIds: [] };
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'scripts/walkin-shanghai-guojin-teams.json', false);
      xhr.send(null);
      if (xhr.status >= 200 && xhr.status < 300) {
        var o = JSON.parse(xhr.responseText);
        teamCfg.hanTeamUserIds = o.hanTeamUserIds || [];
        teamCfg.liuTeamUserIds = o.liuTeamUserIds || [];
      }
    } catch (eCfg) {}
    var storesIn = (j.stores || []).slice();
    var staffIn = (j.staff || []).map(function (x) {
      return Object.assign({}, x);
    });
    if (window.walkinGuojinSplit) {
      try {
        var sp = window.walkinGuojinSplit(storesIn, staffIn, teamCfg);
        mockStores = sp.stores;
        mockStaff = sp.staff;
      } catch (eSp) {
        mockStores = j.stores;
        mockStaff = j.staff;
      }
    } else {
      mockStores = j.stores;
      mockStaff = j.staff;
    }
    state.walkinBasics =
      j.meta && j.meta.walkinBasics ? j.meta.walkinBasics : computeWalkinBasicsHtml(mockStores, mockStaff);
    var ym = (j.meta && j.meta.month) || '';
    var pl = (j.meta && j.meta.periodLabel) || '';
    var tail = mockStores.length + ' 店 / ' + mockStaff.length + ' 人（所选月 Walk-in）';
    if (source === 'api' && j.meta && j.meta.dataSourceDetail) {
      state.dataSourceDetail = String(j.meta.dataSourceDetail);
    } else if (source === 'file') {
      state.dataSource = 'file';
      state.dataSourceDetail = '已从文件导入 · ' + (ym ? '自然月 ' + ym + ' · ' : pl ? pl + ' · ' : '') + tail;
    } else if (source === 'api') {
      state.dataSource = 'live';
      state.dataSourceDetail =
        '实时接口 · 自然月 ' + (ym || pl || '') + ' · ' + tail + ' · 约 45s 自动刷新';
    } else {
      state.dataSource = 'live';
      state.dataSourceDetail =
        '静态文件 · ' + (ym ? '自然月 ' + ym + ' · ' : pl ? pl + ' · ' : '') + tail + '（未连实时接口时可 npm run walkin:api）';
    }
    return true;
  }

  function loadWalkinMonth(ym, silent) {
    stopWalkinPoll();
    var ctx = { fromApi: false };
    if (!silent) {
      state.dataSource = 'loading';
      state.dataSourceDetail = '正在拉取 ' + ym + '（实时接口优先）…';
      state.fiveKit = null;
      render();
    }
    fetch(walkinApiUrl(ym), { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('api');
        return r.json();
      })
      .then(function (j) {
        if (applyWalkinBundle(j, 'api')) {
          ctx.fromApi = true;
          startWalkinPoll();
        } else {
          throw new Error('api');
        }
      })
      .catch(function () {
        return fetch(walkinStaticUrl(ym), { cache: 'no-store' }).then(function (r) {
          if (!r.ok) throw new Error('static');
          return r.json();
        });
      })
      .then(function (j) {
        if (ctx.fromApi) return;
        if (!applyWalkinBundle(j, 'static')) throw new Error('bad');
      })
      .catch(function () {
        if (!ctx.fromApi) {
          state.dataSource = 'demo';
          state.walkinBasics = computeWalkinBasicsHtml(mockStores, mockStaff);
          state.dataSourceDetail =
            '无法加载「' +
            ym +
            '」。请先在本机运行 npm run walkin:api（实时刷新，无需导入 JSON），再用浏览器打开 http://127.0.0.1:3780/ 下的本页；若用 file:// 打开，请在地址后加 ?api=http://127.0.0.1:3780 。也可 npm run data:walkin 生成 data 文件作离线兜底。';
        }
      })
      .finally(function () {
        render();
      });
    // 同步拉取五件套汇总（不阻塞主流程）
    fetchFiveKitSummary(ym);
    // 真实激活数据只需拉一次（累计口径，不随月份变化）
    fetchRealActivation();
  }

  function fetchFiveKitSummary(ym, rangeOverride) {
    if (!ym || !/^\d{4}-\d{2}$/.test(ym)) return;
    var apiUrl;
    if (rangeOverride && rangeOverride.start && rangeOverride.end) {
      // 页面内「自定义区间」选择器：以显式起止日期为准
      apiUrl = '/api/walkin-metrics/summary?start=' + encodeURIComponent(rangeOverride.start) + '&end=' + encodeURIComponent(rangeOverride.end);
    } else {
      // 否则若 URL 携带 period + date，则用精确区间拉取；否则按月
      var _qs = new URLSearchParams(location.search);
      var _period = _qs.get('period') || (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('pdca_period')) || 'month';
      var _anchor = _qs.get('date') || '';
      if (_anchor && _period && _period !== 'month') {
        var _range = _calcPeriodRange(_anchor, _period);
        apiUrl = '/api/walkin-metrics/summary?start=' + encodeURIComponent(_range.start) + '&end=' + encodeURIComponent(_range.end);
      } else {
        apiUrl = '/api/walkin-metrics/summary?month=' + encodeURIComponent(ym);
      }
    }
    fetch(apiUrl, { credentials: 'include', cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (d && d.record_count != null) {
          state.fiveKit = d;
          render();
        }
      })
      .catch(function () {});
  }

  // 真实激活数据（累计，不分period；服务端已有 30 分钟缓存，取一次即可）
  function fetchRealActivation() {
    if (state.realActivation) return;
    fetch('/api/vps/dealer-activation', { credentials: 'include', cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        state.realActivation = d || {};
        render();
      })
      .catch(function () {
        state.realActivation = {};
        render();
      });
  }

  // 内联期间计算（避免外部依赖）
  function _calcPeriodRange(anchor, period) {
    function _f(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
    var p=String(anchor).split('-'), d=new Date(+p[0],+p[1]-1,+p[2]), y=d.getFullYear(), m=d.getMonth();
    if(period==='day')return{start:anchor,end:anchor};
    if(period==='week'){var dow=d.getDay(),dt=dow===0?-6:1-dow,mon=new Date(d),sun=new Date(d);mon.setDate(d.getDate()+dt);sun.setDate(mon.getDate()+6);return{start:_f(mon),end:_f(sun)};}
    if(period==='month'){return{start:_f(new Date(y,m,1)),end:_f(new Date(y,m,new Date(y,m+1,0).getDate()))};}
    if(period==='quarter'){var q=Math.floor(m/3),qsm=q*3,qem=qsm+2;return{start:_f(new Date(y,qsm,1)),end:_f(new Date(y,qem,new Date(y,qem+1,0).getDate()))};}
    return{start:anchor,end:anchor};
  }

  function loadWalkinBundleUrl(url, label, range) {
    stopWalkinPoll();
    state.dataSource = 'loading';
    state.dataSourceDetail = '正在加载 ' + url + ' …';
    // 先清空上一次选择留下的五件套数据，避免加载失败/切换时残留旧区间的数字挂在新标签下
    state.fiveKit = null;
    render();
    fetch(url, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('no file');
        return r.json();
      })
      .then(function (j) {
        if (!applyWalkinBundle(j, 'static')) {
          state.dataSource = 'demo';
        } else {
          state.dataSourceDetail =
            (label || '数据包') + ' · ' + mockStores.length + ' 店 / ' + mockStaff.length + ' 人';
        }
      })
      .catch(function () {
        state.dataSource = 'demo';
        state.dataSourceDetail =
          '未找到 ' +
          url +
          '。季度包需单独导出；可先使用单月（2026-03 / 04 / 05），或扩展 npm run data:walkin 生成季度 JSON。' +
          (range ? '（下方"门店五件套来源"板块仍会展示该区间的真实实报数据）' : '');
      })
      .finally(function () {
        render();
        // 即使月度快照包缺失，五件套来源仍来自真实 DB，按显式区间单独拉取
        if (range && range.start && range.end) {
          fetchFiveKitSummary(range.start.slice(0, 7), range);
        }
      });
  }

  function applyDateFromQuery() {
    var _qs = new URLSearchParams(location.search);
    var dateQ   = _qs.get('date');
    var periodQ = _qs.get('period') || (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('pdca_period')) || 'month';
    state.periodKey = periodQ;

    if (dateQ && /^\d{4}-\d{2}-\d{2}$/.test(dateQ)) {
      var range = _calcPeriodRange(dateQ, periodQ);
      state.selectedMonth = range.start.slice(0, 7);
      state.isCustomDate  = (periodQ === 'day' || periodQ === 'week');
      state.dateRange.start = range.start;
      state.dateRange.end   = range.end;
    }
  }

  function applyCustomDateRange() {
    var s = state.dateRange.start, e = state.dateRange.end;
    if (!s || !e || !/^\d{4}-\d{2}-\d{2}$/.test(s) || !/^\d{4}-\d{2}-\d{2}$/.test(e) || s > e) return;
    state.periodKey = 'custom';
    var mk = s.slice(0, 7);
    if (mk !== state.selectedMonth) {
      state.selectedMonth = mk;
      loadWalkinMonth(mk, false);
    }
    fetchFiveKitSummary(mk, { start: s, end: e });
    render();
  }

  function bootstrap() {
    applyDateFromQuery();
    var startWalkin = function () {
      loadWalkinMonth(state.selectedMonth, false);
    };
    if (typeof WalkinOnlineMerged !== 'undefined') {
      WalkinOnlineMerged.init(undefined, 'data/vn_data_collect_reference.json').finally(startWalkin);
      return;
    }
    startWalkin();
  }

  bootstrap();
})();
  </script>
