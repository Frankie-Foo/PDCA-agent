  <script>
(function () {
  const StoreClass = { CLASS_1: 'Class 1', CLASS_2: 'Class 2' };

  /** 离线兜底：不再使用国内门店 demo，需加载 data/walkin-YYYY-MM.json */
  const FALLBACK_STORES = [];
  const FALLBACK_STAFF = [];

  var mockStores = FALLBACK_STORES;
  var mockStaff = FALLBACK_STAFF;

  /** 实时接口：同域走相对路径；file:// 默认连本机 API（npm run walkin:api） */
  var WALKIN_API_BASE = (function () {
    var q = new URLSearchParams(location.search).get('api');
    if (q) return String(q).replace(/\/$/, '');
    if (location.protocol === 'http:' || location.protocol === 'https:') return '';
    return 'http://127.0.0.1:3780';
  })();

  function walkinApiUrl(ym) {
    var b = WALKIN_API_BASE;
    return (b ? b : '') + '/api/walkin?month=' + encodeURIComponent(ym);
  }

  function walkinStaticUrl(ym) {
    return 'data/walkin-' + ym + '.json';
  }

  var walkinPollTimer = null;

  const state = {
    activeTab: 'dashboard',
    globalSearch: '',
    storeRegionFilter: 'All',
    storeFilterId: 'All',
    staffFilterId: 'All',
    storeTypeFilter: 'All',
    anomalyOnly: false,
    selectedMonth: '2026-05',
    dateRange: { start: '2026-05-01', end: '2026-05-31' },
    isCustomDate: false,
    modal: { open: false, title: '', loading: false, content: '' },
    dataSource: 'loading',
    dataSourceDetail: '正在尝试读取 data/walkin-dashboard.json …',
    walkinBasics: null,
  };

  function computeWalkinBasicsHtml(stores, staff) {
    function pn() {
      var a = arguments;
      for (var i = 0; i < a.length; i++) {
        if (a[i] != null && a[i] !== '') {
          var n = Number(a[i]);
          if (!isNaN(n)) return n;
        }
      }
      return 0;
    }
    var walkinGroups = stores.reduce(function (x, s) {
      return x + pn(s.totalVisitGroups);
    }, 0);
    function sumSS(sk, skSt) {
      var sv = stores.reduce(function (x, s) {
        return x + pn(s[sk]);
      }, 0);
      if (sv > 0) return sv;
      return staff.reduce(function (x, s) {
        return x + pn(s[skSt]);
      }, 0);
    }
    var dealGroups = sumSS('dealGroups', 'dealGroups');
    var walkinPeople = sumSS('walkinPeople', 'walkinPeople');
    var wechatAdd = sumSS('wechatAddCount', 'wechatAddCount');
    var effC = sumSS('effectiveCustomers', 'effectiveCustomers');
    var effA = sumSS('effectiveAdded', 'effectiveAdded');
    var touchCnt = sumSS('touchCount', 'touchCount');
    var useCnt = sumSS('useCount', 'useCount');
    var dealWan =
      Math.round(
        (stores.reduce(function (x, s) {
          return x + pn(s.totalSalesAmount);
        }, 0) /
          10000) *
          10
      ) / 10;
    var pct = function (n, d) {
      return d > 0 ? Math.round((1000 * n) / d) / 10 : 0;
    };
    var addW = 0;
    for (var si = 0; si < stores.length; si++) {
      var s = stores[si];
      addW += pn(s.totalVisitGroups) * pn(s.avgAddRate);
    }
    var addedGrp = Math.round(addW);
    var totalSalesAmt = stores.reduce(function (x, s) {
      return x + pn(s.totalSalesAmount);
    }, 0);
    var estParts = [];
    if (walkinPeople <= 0 && walkinGroups > 0) {
      walkinPeople = Math.round(walkinGroups * 1.66);
      estParts.push('进店人数按约1.66人/组估算（缺画像字段时）');
    }
    if (wechatAdd <= 0 && walkinGroups > 0) {
      if (addedGrp > 0) {
        wechatAdd = addedGrp;
        estParts.push('微信添加按各店组×组添加率聚合估算');
      } else if (walkinPeople > 0) {
        wechatAdd = Math.round(walkinPeople * 0.3);
        estParts.push('微信添加按进店人数比例粗估');
      }
    }
    if (dealGroups <= 0 && totalSalesAmt > 0 && walkinGroups > 0) {
      var aovSum = 0;
      var aovN = 0;
      for (var ai = 0; ai < staff.length; ai++) {
        var stf = staff[ai];
        var ms = pn(stf.monthlySales);
        if (ms > 0) {
          aovSum += ms;
          aovN++;
        }
      }
      var aov = aovN > 0 ? aovSum / aovN : 42000;
      if (aov < 15000) aov = 15000;
      if (aov > 200000) aov = 200000;
      dealGroups = Math.min(walkinGroups, Math.max(0, Math.round(totalSalesAmt / aov)));
      if (dealGroups > 0) estParts.push('成交组数按销额÷导购件均粗估（缺画像字段时）');
    }
    if (effC <= 0 && walkinPeople > 0) {
      effC = Math.round(walkinPeople * 0.41);
      estParts.push('有效客户按进店人数约41%估算');
    }
    if (effA <= 0 && effC > 0) {
      effA = Math.round(effC * 0.79);
      estParts.push('已添加有效按有效客户约79%估算');
    }
    var denomPeople = walkinPeople > 0 ? walkinPeople : walkinGroups;
    var touchRatePct = pct(touchCnt, denomPeople);
    var useRatePct = pct(useCnt, denomPeople);
    if (touchCnt <= 0 && walkinGroups > 0) {
      var tw = 0;
      for (var tj = 0; tj < stores.length; tj++) {
        var st = stores[tj];
        tw += pn(st.totalVisitGroups) * pn(st.avgTouchRate);
      }
      touchRatePct = Math.round((1000 * tw) / walkinGroups) / 10;
    }
    if (useCnt <= 0 && walkinGroups > 0) {
      var uw = 0;
      for (var uj = 0; uj < stores.length; uj++) {
        var su = stores[uj];
        uw += pn(su.totalVisitGroups) * pn(su.avgUseRate);
      }
      useRatePct = Math.round((1000 * uw) / walkinGroups) / 10;
    }
    return {
      walkinGroups: walkinGroups,
      dealGroups: dealGroups,
      walkinPeople: walkinPeople,
      wechatAdd: wechatAdd,
      effectiveCustomers: effC,
      effectiveAdded: effA,
      touchRatePct: touchRatePct,
      useRatePct: useRatePct,
      groupAddRatePct: pct(addedGrp, walkinGroups),
      dealRatePct: pct(dealGroups, walkinGroups),
      wechatRatePct: pct(wechatAdd, walkinPeople),
      validToAddedPct: pct(effA, effC),
      dealTotalWan: dealWan,
      storeCount: stores.length,
      estimatedNote:
        estParts.length > 0
          ? '部分指标：' + estParts.join('；') + '。数据源补齐后将与 VPS 完全一致。'
          : '',
    };
  }

  function escSvgTitle(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')

      .replace(/"/g, '&quot;');

  function renderBarChart(rows) {
    if (!rows || rows.length === 0) {
      return (
        '<svg viewBox="0 0 400 120" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">' +
        '<text x="200" y="64" text-anchor="middle" font-size="12" fill="#94a3b8">暂无门店数据</text></svg>'
      );
    }
    var salesVals = rows.map(function (r) { return r.sales; });
    var maxVal = Math.max.apply(null, salesVals.concat([1]));
    var n = rows.length;
    var w = Math.min(1680, Math.max(760, Math.round(n * 78)));
    var h = 328;
    var pad = { l: 48, r: 24, t: 36, b: 118 };
    var innerW = w - pad.l - pad.r;
    var innerH = h - pad.t - pad.b;
    var slot = innerW / n;
    var barW = slot * 0.56;
    var gap = slot * 0.44;
    var pivotY = pad.t + innerH + 12;
    var svg =
      '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">';
    svg += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="transparent"/>';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var bh = (r.sales / maxVal) * innerH;
      var x = pad.l + i * slot + gap / 2;
      var y = pad.t + innerH - bh;
      var tx = x + barW / 2;
      var fill = parseFloat(r.addRate) < 35 ? '#c45c52' : '#2d7a62';
      var tip =
        r.name + ' · 月销 ' + fmtBarSalesWan(r.sales) + '万 · 组添加率 ' + r.addRate + '%';
      svg += '<g>';
      svg += '<title>' + escSvgTitle(tip) + '</title>';
      svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + bh + '" rx="6" fill="' + fill + '"/>';
      var valStr = fmtBarSalesWan(r.sales) + '万';
      var tyVal = bh >= 26 ? y + 15 : y - 5;
      if (tyVal < pad.t + 12) tyVal = pad.t + 12;
      svg +=
        '<text x="' +
        tx +
        '" y="' +
        tyVal +
        '" text-anchor="middle" font-size="11" font-weight="700" fill="' +
        (bh >= 26 ? '#ffffff' : '#0f172a') +
        '" style="pointer-events:none">' +
        escapeHtml(valStr) +
        '</text>';
      svg +=
        '<text x="' +
        tx +
        '" y="' +
        pivotY +
        '" text-anchor="middle" font-size="9.5" fill="#64748b" transform="rotate(-52 ' +
        tx +
        ' ' +
        pivotY +
        ')" style="pointer-events:none">' +
        escapeHtml(r.name) +
        '</text>';
      svg += '</g>';
    }
    svg += '</svg>';
    return svg;
  }

  function renderDonut() {
    var data = [
      { name: '1-3日已触达', value: 85, color: '#10b981' },
      { name: '7日已触达', value: 65, color: '#2d7a62' },
      { name: '14日+已触达', value: 45, color: '#f59e0b' },
      { name: '待触达/异常', value: 15, color: '#f43f5e' },
    ];
    var total = data.reduce(function (a, d) { return a + d.value; }, 0);
    var cx = 90;
    var cy = 90;
    var r = 52;
    var ir = 36;
    var start = -Math.PI / 2;
    var paths = '';
    for (var i = 0; i < data.length; i++) {
      var frac = data[i].value / total;
      var end = start + frac * 2 * Math.PI;
      var x1 = cx + r * Math.cos(start);
      var y1 = cy + r * Math.sin(start);
      var x2 = cx + r * Math.cos(end);
      var y2 = cy + r * Math.sin(end);
      var x1i = cx + ir * Math.cos(start);
      var y1i = cy + ir * Math.sin(start);
      var x2i = cx + ir * Math.cos(end);
      var y2i = cy + ir * Math.sin(end);
      var large = end - start > Math.PI ? 1 : 0;
      paths +=
        '<path d="M ' +
        x1 +
        ' ' +
        y1 +
        ' A ' +
        r +
        ' ' +
        r +
        ' 0 ' +
        large +
        ' 1 ' +
        x2 +
        ' ' +
        y2 +
        ' L ' +
        x2i +
        ' ' +
        y2i +
        ' A ' +
        ir +
        ' ' +
        ir +
        ' 0 ' +
        large +
        ' 0 ' +
        x1i +
        ' ' +
        y1i +
        ' Z" fill="' +
        data[i].color +
        '" stroke="#fff" stroke-width="2"/>';
      start = end;
    }
    return (
      '<svg viewBox="0 0 180 180" width="100%" height="100%">' +
      paths +
      '</svg>'
    );
  }

  function sparkline(vals, stroke) {
    var w = 64;
    var h = 32;
    var max = Math.max.apply(null, vals.concat([1]));
    var min = Math.min.apply(null, vals.concat([0]));
    var range = max - min || 1;
    var pts = vals
      .map(function (v, i) {
        var x = (i / (vals.length - 1 || 1)) * (w - 4) + 2;
        var y = h - 2 - ((v - min) / range) * (h - 4);
        return x + ',' + y;
      })
      .join(' ');
    return (
      '<svg width="' +
      w +
      '" height="' +
      h +
      '" viewBox="0 0 ' +
      w +
      ' ' +
      h +
      '"><polyline fill="none" stroke="' +
      stroke +
      '" stroke-width="2" points="' +
      pts +
      '"/></svg>'
    );
  }

  function getAiAlertBuckets(maxLow, maxNoDeal, maxStaff) {
    var ml = maxLow == null ? 8 : maxLow;
    var mn = maxNoDeal == null ? 8 : maxNoDeal;
    var ms = maxStaff == null ? 12 : maxStaff;
    var lowAdd = mockStores
      .filter(function (s) {
        return (s.avgAddRate || 0) < 0.35 && (s.totalVisitGroups || 0) >= 5;
      })
      .slice()
      .sort(function (a, b) {
        return (a.avgAddRate || 0) - (b.avgAddRate || 0);

  function applyWalkinBundle(j, source) {
    if (!(j.stores && j.stores.length && j.staff && j.staff.length)) {
      state.dataSource = 'demo';
      state.dataSourceDetail = 'JSON 无有效 stores/staff。';
      state.walkinBasics = null;
      return false;
    }
    var teamCfg = { hanTeamUserIds: [], liuTeamUserIds: [] };
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'scripts/walkin-shanghai-guojin-teams.json', false);
      xhr.send(null);
      if (xhr.status >= 200 && xhr.status < 300) {
        var o = JSON.parse(xhr.responseText);
        teamCfg.hanTeamUserIds = o.hanTeamUserIds || [];
        teamCfg.liuTeamUserIds = o.liuTeamUserIds || [];
      }
    } catch (eCfg) {}
    var storesIn = (j.stores || []).slice();
    var staffIn = (j.staff || []).map(function (x) {
      return Object.assign({}, x);
    });
    if (window.walkinGuojinSplit) {
      try {
        var sp = window.walkinGuojinSplit(storesIn, staffIn, teamCfg);
        mockStores = sp.stores;
        mockStaff = sp.staff;
      } catch (eSp) {
        mockStores = j.stores;
        mockStaff = j.staff;
      }
    } else {
      mockStores = j.stores;
      mockStaff = j.staff;
    }
    state.walkinBasics =
      j.meta && j.meta.walkinBasics ? j.meta.walkinBasics : computeWalkinBasicsHtml(mockStores, mockStaff);
    var ym = (j.meta && j.meta.month) || '';
    var pl = (j.meta && j.meta.periodLabel) || '';
    var tail = mockStores.length + ' 店 / ' + mockStaff.length + ' 人（所选月 Walk-in）';
    if (source === 'api' && j.meta && j.meta.dataSourceDetail) {
      state.dataSourceDetail = String(j.meta.dataSourceDetail);
    } else if (source === 'file') {
      state.dataSource = 'file';
      state.dataSourceDetail = '已从文件导入 · ' + (ym ? '自然月 ' + ym + ' · ' : pl ? pl + ' · ' : '') + tail;
    } else if (source === 'api') {
      state.dataSource = 'live';
      state.dataSourceDetail =
        '实时接口 · 自然月 ' + (ym || pl || '') + ' · ' + tail + ' · 约 45s 自动刷新';
    } else {
      state.dataSource = 'live';
      state.dataSourceDetail =
        '静态文件 · ' + (ym ? '自然月 ' + ym + ' · ' : pl ? pl + ' · ' : '') + tail + '（未连实时接口时可 npm run walkin:api）';
    }
    return true;
  }

  function loadWalkinMonth(ym, silent) {
    stopWalkinPoll();
    var ctx = { fromApi: false };
    if (!silent) {
      state.dataSource = 'loading';
      state.dataSourceDetail = '正在拉取 ' + ym + '（实时接口优先）…';
      render();
    }
    fetch(walkinApiUrl(ym), { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('api');
        return r.json();
      })
      .then(function (j) {
        if (applyWalkinBundle(j, 'api')) {
          ctx.fromApi = true;
          startWalkinPoll();
        } else {
          throw new Error('api');
        }
      })
      .catch(function () {
        return fetch(walkinStaticUrl(ym), { cache: 'no-store' }).then(function (r) {
          if (!r.ok) throw new Error('static');
          return r.json();
        });
      })
      .then(function (j) {
        if (ctx.fromApi) return;
        if (!applyWalkinBundle(j, 'static')) throw new Error('bad');
      })
      .catch(function () {
        if (!ctx.fromApi) {
          state.dataSource = 'demo';
          state.walkinBasics = computeWalkinBasicsHtml(mockStores, mockStaff);
          state.dataSourceDetail =
            '无法加载「' +
            ym +
            '」。请先在本机运行 npm run walkin:api（实时刷新，无需导入 JSON），再用浏览器打开 http://127.0.0.1:3780/ 下的本页；若用 file:// 打开，请在地址后加 ?api=http://127.0.0.1:3780 。也可 npm run data:walkin 生成 data 文件作离线兜底。';
        }
      })
      .finally(function () {
        render();
      });
  }

  function loadWalkinBundleUrl(url, label) {
    stopWalkinPoll();
    state.dataSource = 'loading';
    state.dataSourceDetail = '正在加载 ' + url + ' …';
    render();
    fetch(url, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('no file');
        return r.json();
      })
      .then(function (j) {
        if (!applyWalkinBundle(j, 'static')) {
          state.dataSource = 'demo';
        } else {
          state.dataSourceDetail =
            (label || '数据包') + ' · ' + mockStores.length + ' 店 / ' + mockStaff.length + ' 人';
        }
      })
      .catch(function () {
        state.dataSource = 'demo';
        state.dataSourceDetail =
          '未找到 ' +
          url +
          '。季度包需单独导出；可先使用单月（2026-03 / 04 / 05），或扩展 npm run data:walkin 生成季度 JSON。';
      })
      .finally(function () {
        render();
      });
  }

  function applyDateFromQuery() {
    var dateQ = new URLSearchParams(location.search).get('date');
    if (dateQ && /^\d{4}-\d{2}-\d{2}$/.test(dateQ)) {
      state.selectedMonth = dateQ.slice(0, 7);
      state.isCustomDate = false;
      state.dateRange.start = dateQ;
      state.dateRange.end = dateQ;
    }
  }

  function bootstrap() {
    applyDateFromQuery();
    var startWalkin = function () {
      loadWalkinMonth(state.selectedMonth, false);
    };
    if (typeof WalkinOnlineMerged !== 'undefined') {
      WalkinOnlineMerged.init(
        'data/online_channel_reference.json',
        'data/vn_data_collect_reference.json'
      ).finally(startWalkin);
      return;
    }
    startWalkin();
  }

  bootstrap();
})();
  </script>
</body>
</html>
