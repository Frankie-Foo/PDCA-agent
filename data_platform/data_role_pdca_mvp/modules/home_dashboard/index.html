<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据岗位 PDCA 工作台</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
         background:#0b0d13;color:#e2e8f0}
    .page{padding:20px;max-width:1680px;margin:0 auto}
    .card{background:#13182a;border:1px solid rgba(255,255,255,.07);border-radius:14px}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid rgba(255,255,255,.1);background:transparent;padding:8px 18px;
         border-radius:999px;cursor:pointer;font-weight:600;color:#94a3b8;transition:all .15s}
    .tab.active{background:rgba(78,158,245,.15);color:#4e9ef5;border-color:rgba(78,158,245,.3)}
    .flash{margin-bottom:12px;padding:10px 14px;border-radius:10px;
           background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);
           color:#10b981;font-size:14px;display:none}
    .top-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    .metric-card,.stat{padding:22px;min-height:120px;display:flex;flex-direction:column;
                       justify-content:flex-start;align-items:stretch}
    .metric-body,.stat-body{width:100%;display:flex;flex-direction:column;align-items:flex-start;text-align:left;flex:1}
    .metric-label,.label{color:#475569;font-size:14px;margin:0 0 10px;width:100%;line-height:1.35;font-weight:400}
    .metric-value,.value{font-size:28px;font-weight:800;width:100%;margin:0;line-height:1.15;
                         font-variant-numeric:tabular-nums;color:#e2e8f0;flex:1;display:flex;align-items:center;min-height:36px}
    .amount-num{display:block;text-align:left;letter-spacing:-0.02em}
    .amount-unit{font-size:.72em;font-weight:800;margin-left:2px}
    .metric-foot,.stat-foot{margin-top:10px;font-size:12px;color:#475569;line-height:1.35;width:100%}
    .metric-foot:empty{display:none}
    .metric-link{cursor:pointer;transition:transform .15s,border-color .15s}
    .metric-link:hover{transform:translateY(-2px);border-color:rgba(78,158,245,.3)}
    .grid-main{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px}
    .section{padding:18px}
    .section-title{display:flex;justify-content:space-between;align-items:center;
                   font-size:18px;font-weight:800;margin-bottom:14px;gap:8px;flex-wrap:wrap;color:#e2e8f0}
    .btn{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:7px 12px;
         background:rgba(255,255,255,.06);color:#94a3b8;cursor:pointer;font-size:13px;
         text-decoration:none;display:inline-block;transition:all .15s}
    .btn:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
    .btn.ghost{background:rgba(255,255,255,.03);color:#475569}
    .customer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .customer-grid .metric-card{min-height:110px;padding:16px 18px}
    .progress{margin-top:8px;height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;width:100%}
    .progress span{display:block;height:100%;background:#4e9ef5;border-radius:999px}
    .empty-hint{color:#475569;font-size:13px;padding:8px 0}
    .today-grid{display:grid;grid-template-columns:1.1fr 1.4fr .8fr;gap:16px;margin-bottom:16px}
    .today-panel{padding:20px}.today-title{font-size:17px;font-weight:800;margin-bottom:12px}
    .truth-row,.action-row{padding:10px 0;border-top:1px solid rgba(255,255,255,.06)}
    .truth-row:first-child,.action-row:first-child{border-top:0}.truth-name{color:#94a3b8;font-size:13px}.truth-value{float:right;font-weight:800}
    .truth-source{display:block;color:#475569;font-size:11px;margin-top:4px}.state-missing{color:#f59e0b}
    .action-row{display:block;color:#e2e8f0;text-decoration:none}.action-row strong{display:block;font-size:14px}.action-row span{color:#64748b;font-size:12px}
    .closure-value{font-size:36px;font-weight:900;color:#4e9ef5}.closure-note{font-size:12px;color:#64748b;margin-top:8px}
    #dataUpdateHint{font-size:12px;color:#475569}
    /* 模块入口卡片 */
    .module-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
    .module-card{display:flex;align-items:center;justify-content:space-between;
                 padding:24px 28px;text-decoration:none;color:#e2e8f0;
                 transition:transform .15s,border-color .15s,background .15s;cursor:pointer}
    .module-card:hover{transform:translateY(-2px);border-color:rgba(78,158,245,.35);
                       background:rgba(78,158,245,.05)}
    .module-card-body{display:flex;flex-direction:column;gap:6px}
    .module-card-title{font-size:17px;font-weight:800;color:#e2e8f0}
    .module-card-desc{font-size:13px;color:#475569}
    .module-card-arrow{font-size:20px;color:#4e9ef5;opacity:.55;flex-shrink:0;margin-left:12px}
    @media(max-width:1000px){
      .top-stats,.module-cards,.today-grid{grid-template-columns:1fr}
      .customer-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="flashMsg" class="flash"></div>
    <div class="toolbar">
      <!-- 日/周/月/季切换已统一由顶部共享导航栏（shared/shell.js）提供，这里不再重复一份 -->
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span id="dataUpdateHint" style="font-size:12px;color:#9ca3af"></span>
        <button type="button" class="btn ghost" id="btnFetch" onclick="fetchRefresh()">刷新</button>
        <button type="button" class="btn" id="btnRebuild" onclick="rebuildDashboard()" title="重新运行 bridge 脚本生成最新数据（约1-3分钟）" style="background:rgba(78,158,245,.12);color:#4e9ef5;border-color:rgba(78,158,245,.3)">重建数据</button>
        <span id="rebuildStatus" style="font-size:12px;color:#f59e0b;display:none"></span>
      </div>
    </div>

    <div class="today-grid">
      <section class="card today-panel">
        <div class="today-title">今天发生了什么</div>
        <div id="todayFacts"><div class="empty-hint">正在读取当前账号范围内的真实数据…</div></div>
      </section>
      <section class="card today-panel">
        <div class="today-title">现在做什么</div>
        <div id="todayActions"><div class="empty-hint">正在识别异常和缺口…</div></div>
      </section>
      <section class="card today-panel">
        <div class="today-title">今日闭环</div>
        <div class="closure-value" id="closureValue">—</div>
        <div class="closure-note" id="closureNote">只按真实上报计算</div>
      </section>
    </div>

    <div class="top-stats">
      <div class="card stat metric-card">
        <div class="metric-body stat-body">
          <div class="metric-label label">姓名 / 权限</div>
          <div class="metric-value value" id="managerName"><span class="amount-num">—</span></div>
          <div class="metric-foot stat-foot" id="managerRole">加载中…</div>
        </div>
      </div>
      <div class="card stat metric-card metric-link" role="link" tabindex="0" title="打开提货明细" onclick="location.href='/dealer-sellin'" onkeydown="if(event.key==='Enter')location.href='/dealer-sellin'">
        <div class="metric-body stat-body">
          <div class="metric-label label">经销商提货金额 Sell In</div>
          <div class="metric-value value" id="sellInAmount"><span class="amount-num">—</span></div>
          <div class="metric-foot stat-foot" id="sellInFoot" style="font-size:11px;color:#475569"></div>
        </div>
      </div>
      <div class="card stat metric-card metric-link sell-out-card" role="link" tabindex="0" title="打开客流接待台（海外客流与线上经营）" onclick="location.href=withDate('/walkin-cockpit/')" onkeydown="if(event.key==='Enter')location.href=withDate('/walkin-cockpit/')">
        <div class="metric-body stat-body">
          <div class="metric-label label">经销商终销金额 Sell Out</div>
          <div class="metric-value value" id="sellOutAmount"><span class="amount-num">—</span></div>
          <div class="metric-foot stat-foot" id="sellOutFoot" style="font-size:11px;color:#475569"></div>
        </div>
      </div>
    </div>

    <div class="grid-main">
      <section class="card section">
        <div class="section-title">客户管理中心 <button type="button" class="btn ghost" onclick="location.href='/customer-mgmt'">详情</button></div>
        <div class="customer-grid" id="customerCenter"></div>
      </section>
    </div>

    <div class="module-cards">
      <a href="/logistics-center/" class="card module-card">
        <div class="module-card-body">
          <div class="module-card-title">物流进展</div>
          <div class="module-card-desc">货物追踪与配送状态</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
      <a href="/walkin-cockpit/" class="card module-card">
        <div class="module-card-body">
          <div class="module-card-title">客流接待台</div>
          <div class="module-card-desc">进店接待、转化漏斗与线上经营分析</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
      <a href="/store-five-kit/" class="card module-card" id="cardStoreFiveKit">
        <div class="module-card-body">
          <div class="module-card-title">门店五件套</div>
          <div class="module-card-desc">各门店五件套数据展示</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
      <a href="/meeting-center/" class="card module-card">
        <div class="module-card-body">
          <div class="module-card-title">会议中心</div>
          <div class="module-card-desc">会议纪要与待办分发</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
      <a href="/onboarding-center/" class="card module-card">
        <div class="module-card-body">
          <div class="module-card-title">新人培训</div>
          <div class="module-card-desc">新人上手课程与进度跟踪</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
      <a href="/admin-panel/" class="card module-card" id="cardAdminPanel">
        <div class="module-card-body">
          <div class="module-card-title">管理后台</div>
          <div class="module-card-desc">用户与权限管理</div>
        </div>
        <span class="module-card-arrow">→</span>
      </a>
    </div>
  </div>

  <script>
    const API = {
      dashboard: '/api/dashboard/overview',
      sellIn: '/api/dashboard/sell-in',
      sellOut: '/api/dashboard/sell-out',
      customerCenter: '/api/customer-center/summary',
      today: '/api/workbench/today',
    };

    const _qs0 = new URLSearchParams(location.search);
    let currentPeriod = _qs0.get('period') || (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('pdca_period')) || 'day';

    function workDate() {
      const q = new URLSearchParams(location.search).get('date');
      if (q && /^\d{4}-\d{2}-\d{2}$/.test(q)) return q;
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
    }

    function withDate(url) {
      const sep = url.indexOf('?') >= 0 ? '&' : '?';
      return url + sep + 'date=' + encodeURIComponent(workDate()) + '&period=' + encodeURIComponent(currentPeriod);
    }

    function showFlash() {
      const msg = new URLSearchParams(location.search).get('message');
      if (!msg) return;
      const el = document.getElementById('flashMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function formatWanHtml(wan) {
      if (wan == null || wan === '') return '<span class="amount-num">—</span>';
      return '<span class="amount-num">' + wan + '<span class="amount-unit">万</span></span>';
    }

    function escapeHtml(text) {
      return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function request(url, params) {
      params = params || {};
      params.period = currentPeriod;
      params.date = workDate();
      const query = new URLSearchParams(params).toString();
      const res = await fetch(url + '?' + query, { cache: 'no-store', credentials: 'include' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    }

    async function loadSection(label, loader) {
      try {
        await loader();
      } catch (err) {
        console.error(label, err);
      }
    }

    async function fetchRefresh() {
      var btn = document.getElementById('btnFetch');
      if (btn) { btn.textContent = '⏳ 刷新中…'; btn.disabled = true; }
      try { await refreshDashboard(); } finally {
        if (btn) { btn.textContent = '刷新'; btn.disabled = false; }
      }
    }

    async function rebuildDashboard() {
      var btn = document.getElementById('btnRebuild');
      var status = document.getElementById('rebuildStatus');
      if (btn) { btn.disabled = true; btn.textContent = '重建中…'; }
      if (status) { status.style.display = ''; status.textContent = '⏳ 正在重建数据…（约1-3分钟）'; }
      var start = Date.now();
      var timer = setInterval(function () {
        var s = Math.floor((Date.now() - start) / 1000);
        if (status) status.textContent = '⏳ 重建中 ' + s + 's…（数据正在从 Odoo 拉取生成）';
      }, 1000);
      try {
        var res = await fetch('/api/dashboard/refresh', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: workDate() })
        });
        clearInterval(timer);
        if (res.ok) {
          var elapsed = Math.floor((Date.now() - start) / 1000);
          if (status) { status.textContent = '✅ 重建完成（耗时 ' + elapsed + 's）'; }
          await refreshDashboard();
          setTimeout(function () { if (status) status.style.display = 'none'; }, 4000);
        } else {
          if (status) { status.textContent = '❌ 重建失败（' + res.status + '）'; }
        }
      } catch (e) {
        clearInterval(timer);
        if (status) { status.textContent = '❌ 请求超时或网络错误'; }
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '重建数据'; }
      }
    }

    function renderSellCard(amountEl, footEl, wan, amountText, note) {
      if (wan != null && wan !== '') {
        amountEl.innerHTML = formatWanHtml(wan);
      } else {
        amountEl.innerHTML = '<span class="amount-num">' + escapeHtml(amountText || '—') + '</span>';
      }
      if (footEl) footEl.textContent = note || '';
    }

    async function refreshDashboard() {
      const params = { managerId: 'default' };
      let overview = null;

      await loadSection('today', async function () {
        renderToday(await request(API.today, {}));
      });

      await loadSection('overview', async function () {
        overview = await request(API.dashboard, params);
        managerName.innerHTML = '<span class="amount-num">' + escapeHtml(overview.managerName || '—') + '</span>';
        managerRole.textContent = overview.managerRole || '';
        if (overview.dataUpdatedAt) {
          var hint = document.getElementById('dataUpdateHint');
          if (hint) {
            var d = new Date(overview.dataUpdatedAt);
            var diff = Math.floor((Date.now() - d.getTime()) / 1000);
            var rel = diff < 60 ? '刚刚' : diff < 3600 ? Math.floor(diff / 60) + '分钟前' : Math.floor(diff / 3600) + '小时前';
            hint.textContent = '数据截至 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) + '（' + rel + '）';
          }
        }
      });

      // Sell In / Sell Out：分别按当前 period（日/周/月/季）向 Odoo 实时取数，
      // 不能复用 overview 里的字段（那部分对 period 不敏感，会一直显示月度累计）。
      await loadSection('sellIn', async function () {
        try {
          const sellIn = await request(API.sellIn, params);
          renderSellCard(sellInAmount, document.getElementById('sellInFoot'), sellIn.wan,
            sellIn.amount != null ? ('¥ ' + Math.round(sellIn.amount).toLocaleString()) : null, sellIn.note);
        } catch (err) {
          if (overview) {
            renderSellCard(sellInAmount, document.getElementById('sellInFoot'), overview.sellInWan, overview.sellInAmount, overview.sellInSub);
          }
          throw err;
        }
      });

      await loadSection('sellOut', async function () {
        try {
          const sellOut = await request(API.sellOut, params);
          renderSellCard(sellOutAmount, document.getElementById('sellOutFoot'), sellOut.wan,
            sellOut.amount != null ? ('¥ ' + Math.round(sellOut.amount).toLocaleString()) : null, sellOut.note);
        } catch (err) {
          if (overview) {
            renderSellCard(sellOutAmount, document.getElementById('sellOutFoot'), overview.sellOutWan, overview.sellOutAmount, overview.sellOutSub);
          }
          throw err;
        }
      });

      await loadSection('customers', async function () {
        renderCustomers(await request(API.customerCenter, params));
      });
    }

    function renderToday(data) {
      const labels = {walkin_visits:'今日进店',walkin_reported:'已上报门店',walkin_missing:'未上报门店',logistics_attention:'物流异常/待核查'};
      const keys = ['walkin_visits','walkin_reported','walkin_missing','logistics_attention'];
      todayFacts.innerHTML = keys.map(function (key) {
        const fact = (data.facts||{})[key] || {};
        const missing = fact.state !== 'available';
        return '<div class="truth-row"><span class="truth-name">'+escapeHtml(labels[key])+'</span>'+
          '<span class="truth-value '+(missing?'state-missing':'')+'">'+escapeHtml(missing?'未同步':String(fact.value))+'</span>'+
          '<span class="truth-source">来源：'+escapeHtml(fact.source||'未知')+(fact.message?' · '+escapeHtml(fact.message):'')+'</span></div>';
      }).join('');
      todayActions.innerHTML = (data.actions||[]).map(function (item) {
        const tag = item.href ? 'a' : 'div';
        return '<'+tag+' class="action-row"'+(item.href?' href="'+escapeHtml(item.href)+'"':'')+'><strong>'+escapeHtml(item.title)+'</strong><span>'+escapeHtml(item.message)+'</span></'+tag+'>';
      }).join('') || '<div class="empty-hint">暂无可识别行动</div>';
      const closure = data.closure||{};
      closureValue.textContent = closure.expected ? (closure.reported+'/'+closure.expected) : '—';
      closureNote.textContent = closure.expected ? (closure.complete?'今日门店上报已闭环':'仍有 '+(closure.expected-closure.reported)+' 家待上报') : '账号未绑定可见门店';
    }

    function renderCustomers(data) {
      if (!data || !data.length) {
        customerCenter.innerHTML = '<div class="empty-hint">暂无客户分层数据</div>';
        return;
      }
      customerCenter.innerHTML = data.map(function (item) {
        const touchedKnown = item.touched != null;
        const width = touchedKnown && item.target > 0 ? Math.min(item.touched / item.target * 100, 100) : 0;
        return (
          '<div class="card metric-card metric-link" onclick="location.href=\'/customer-mgmt\'">' +
          '<div class="metric-body">' +
          '<div class="metric-label">' + escapeHtml(item.level) + ' 类客户</div>' +
          '<div class="metric-value"><span class="amount-num">' + item.total + '<span class="amount-unit">家</span></span></div>' +
          '<div class="metric-foot">触达 ' + (touchedKnown?item.touched:'未同步') + '/' + item.target + '</div>' +
          '<div class="progress"><span style="width:' + width + '%"></span></div>' +
          '</div></div>'
        );
      }).join('');
    }


    async function applyRoleVisibility() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) return;
        const me = await res.json();
        var hideIfViewer = ['cardStoreFiveKit'];
        if (me.role === 'viewer') {
          hideIfViewer.forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.style.display = 'none';
          });
        }
        if (me.role !== 'admin') {
          var admin = document.getElementById('cardAdminPanel');
          if (admin) admin.style.display = 'none';
        }
      } catch (_) {}
    }

    showFlash();
    refreshDashboard();
    applyRoleVisibility();
  </script>
</body>
</html>
