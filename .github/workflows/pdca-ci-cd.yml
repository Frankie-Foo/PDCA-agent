name: PDCA CI/CD

on:
  pull_request:
    paths:
      - ".github/workflows/pdca-ci-cd.yml"
      - "pdca-workbench/**"
      - "data_platform/data_role_pdca_mvp/**"
      - "README.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/pdca-ci-cd.yml"
      - "pdca-workbench/**"
      - "data_platform/data_role_pdca_mvp/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      deploy_via_ssh:
        description: "Only enable when the target has a GitHub-reachable SSH address"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Python tests and configuration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pdca-workbench
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pdca-workbench/requirements.lock

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.lock

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -q

      - name: Compile Python sources
        run: python -m compileall -q app scripts tests run.py

      - name: Validate deployment scripts
        run: bash -n scripts/deploy_internal.sh scripts/docker_up.sh scripts/deploy_release.sh scripts/docker_smoke_test.sh

      - name: Validate Docker Compose configuration
        env:
          PDCA_SECRET_KEY: ci-only-secret-key-at-least-32-characters
          PDCA_DATABASE_URL: postgresql+psycopg2://pdca:dummy@postgres.invalid:5432/pdca
          VERTU_APP_KEY: ci-only-not-a-real-key
          VERTU_USER_LOGIN: ci@example.invalid
        run: docker compose config --quiet

  image:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: pdca-workbench
          push: false
          load: true
          tags: pdca-workbench:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container and run smoke tests
        run: bash pdca-workbench/scripts/docker_smoke_test.sh "pdca-workbench:${{ github.sha }}"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish tested image
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          registry_image="ghcr.io/frankie-foo/pdca-workbench"
          docker tag "pdca-workbench:${{ github.sha }}" "$registry_image:${{ github.sha }}"
          docker tag "pdca-workbench:${{ github.sha }}" "$registry_image:latest"
          docker push "$registry_image:${{ github.sha }}"
          docker push "$registry_image:latest"

  deploy:
    name: Deploy production
    # 10.100.0.176 is an internal Caddy/Docker host and cannot be reached by a
    # GitHub-hosted runner. Normal main pushes publish the tested image; an
    # internal deployment runner pulls it outbound. Keep SSH as an explicit
    # break-glass option for a future publicly reachable/bastion endpoint.
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_via_ssh
    needs: [test, image]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://pdca-workbench-teams.vertu.cn/
    concurrency:
      group: pdca-production
      cancel-in-progress: false
    steps:
      - name: Require SSH host fingerprint
        env:
          HOST_FINGERPRINT: ${{ secrets.PDCA_DEPLOY_HOST_FINGERPRINT }}
        run: test -n "$HOST_FINGERPRINT"

      - name: Deploy exact commit over SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          PDCA_IMAGE_REGISTRY: ghcr.io/frankie-foo/pdca-workbench
        with:
          host: ${{ secrets.PDCA_DEPLOY_HOST }}
          port: ${{ secrets.PDCA_DEPLOY_PORT || '22' }}
          username: ${{ secrets.PDCA_DEPLOY_USER }}
          key: ${{ secrets.PDCA_DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.PDCA_DEPLOY_HOST_FINGERPRINT }}
          command_timeout: 12m
          envs: GHCR_TOKEN,GHCR_USER,PDCA_IMAGE_REGISTRY
          script: |
            set -euo pipefail
            cleanup_registry_login() {
              docker logout ghcr.io >/dev/null 2>&1 || true
            }
            trap cleanup_registry_login EXIT
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_USER" --password-stdin >/dev/null
            cd /opt/PDCA-agent
            target_sha='${{ github.sha }}'
            git fetch --no-tags origin "$target_sha"
            docker pull "$PDCA_IMAGE_REGISTRY:$target_sha"
            temp_script="$(mktemp)"
            trap 'rm -f "$temp_script"; cleanup_registry_login' EXIT
            git show "$target_sha:pdca-workbench/scripts/deploy_release.sh" > "$temp_script"
            chmod 700 "$temp_script"
            PDCA_REPO_ROOT="$PWD" PDCA_IMAGE_REGISTRY="$PDCA_IMAGE_REGISTRY" \
              bash "$temp_script" "$target_sha"
