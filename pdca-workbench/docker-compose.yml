# PDCA 对内工作台 · Docker Compose
# 用法（在完整仓库内）：
#   cd /opt/PDCA-agent/pdca-workbench
#   docker compose up -d --build
#
# 会自动：
#   - 挂载 ../data_platform/data_role_pdca_mvp → /mvp（经营首页）
#   - 挂载仓库根 → /repo
#   - env.docker 仅含非敏感默认项；密钥和数据库连接从 .env/环境变量注入

services:
  pdca-app:
    build: .
    image: ${PDCA_IMAGE:-pdca-workbench:local}
    container_name: pdca-workbench
    ports:
      # 公网由宿主机 Caddy/Nginx 反代；不把 Uvicorn 直接暴露到外网。
      - "127.0.0.1:${PDCA_HOST_PORT:-8768}:8767"
    env_file:
      - path: env.docker
        required: true
      - path: .env
        required: false
    environment:
      PDCA_ENV: production
      PDCA_SECRET_KEY: ${PDCA_SECRET_KEY:?请在未跟踪的 .env 中设置 PDCA_SECRET_KEY}
      PDCA_DATABASE_URL: ${PDCA_DATABASE_URL:?请在未跟踪的 .env 中设置 PDCA_DATABASE_URL}
      PDCA_HOST: "0.0.0.0"
      PDCA_WORKBENCH_PORT: "8767"
      # 强制容器内路径，避免宿主机 Windows 路径写进 .env 导致首页不可用
      PDCA_MVP_ROOT: /mvp
      PDCA_REPO_ROOT: /repo
      PDCA_AUTH_MODE: ${PDCA_AUTH_MODE:-hybrid}
      PDCA_SECURE_COOKIES: ${PDCA_SECURE_COOKIES:-1}
      PDCA_REQUIRE_VERTU: "1"
      VERTU_COMMAND: vertu-cli
      VERTU_VPS_SERVICE_URL: ${VERTU_VPS_SERVICE_URL:-https://vps-service.vertu.cn}
      VERTU_APP_ID: ${VERTU_APP_ID:-cursor}
      VERTU_APP_KEY: ${VERTU_APP_KEY:?请在未跟踪的 .env 中设置 VERTU_APP_KEY}
      VERTU_USER_LOGIN: ${VERTU_USER_LOGIN:?请在未跟踪的 .env 中设置 VERTU_USER_LOGIN}
    volumes:
      - ./data:/app/data
      - ../data_platform/data_role_pdca_mvp:/mvp:ro
      - ./data/runtime/inputs:/mvp/inputs
      - ./data/runtime/outputs:/mvp/outputs
      - ./data/runtime/outbox:/mvp/outbox
      - ../:/repo:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8767/health'))['status'] == 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - pdca-net

  nginx:
    image: nginx:alpine
    container_name: pdca-nginx
    # 线上已有 Caddy 时不启动；仅无宿主机反代时显式加 --profile bundled-proxy。
    profiles: ["bundled-proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 若有证书可取消注释：
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      pdca-app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pdca-net

networks:
  pdca-net:
    driver: bridge
