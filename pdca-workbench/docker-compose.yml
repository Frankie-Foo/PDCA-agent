services:
  pdca-app:
    build: .
    container_name: pdca-workbench
    ports:
      - "8767:8767"
    env_file:
      - .env
    environment:
      - PDCA_HOST=0.0.0.0
      - PDCA_WORKBENCH_PORT=8767
      # 容器内路径（与下方 volumes 对应）
      - PDCA_MVP_ROOT=/mvp
      - PDCA_REPO_ROOT=/repo
    volumes:
      - ./data:/app/data
      # 完整工作台：挂载同仓库 MVP + 仓库根（相对 docker-compose 所在目录）
      - ../data_platform/data_role_pdca_mvp:/mvp:ro
      - ../:/repo:ro
    restart: unless-stopped
    networks:
      - pdca-net

  nginx:
    image: nginx:alpine
    container_name: pdca-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书目录
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - pdca-app
    restart: unless-stopped
    networks:
      - pdca-net

networks:
  pdca-net:
    driver: bridge
