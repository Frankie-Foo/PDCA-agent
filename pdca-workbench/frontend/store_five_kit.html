<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>门店五件套 · PDCA</title>
  <style>
    :root {
      --blue:#4e9ef5;--green:#10b981;--red:#f43f5e;--amber:#f59e0b;--purple:#a855f7;
      --bg:#0b0d13;--surf:#13182a;--surf2:#1a2035;--surf3:#202840;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
      --t1:#e2e8f0;--t2:#94a3b8;--t3:#475569;--t4:#334155;
      --r6:6px;--r10:10px;--r12:12px;--r16:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}

    /* ── 顶栏 ── */
    .header{background:rgba(11,13,19,.95);backdrop-filter:blur(16px);
            padding:0 1.5rem;display:flex;align-items:center;gap:0.75rem;
            height:52px;position:sticky;top:0;z-index:100;
            border-bottom:1px solid var(--border)}
    .header-logo{font-size:.85rem;font-weight:800;color:var(--t1);white-space:nowrap;
                 display:flex;align-items:center;gap:.4rem}
    .header-logo span{color:var(--blue)}
    .sep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
    .period-group{display:inline-flex;align-items:center;background:rgba(255,255,255,.05);
                  border:1px solid var(--border2);border-radius:7px;padding:2px;gap:1px}
    .period-btn{background:transparent;border:none;color:var(--t3);
                font-size:.75rem;font-weight:700;padding:3px 9px;border-radius:5px;
                cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
    .period-btn:hover{color:var(--t2)}
    .period-btn.active{background:rgba(78,158,245,.25);color:var(--blue)}
    .date-input{background:rgba(255,255,255,.05);border:1px solid var(--border2);
                color:var(--t1);border-radius:var(--r6);padding:.3rem .6rem;
                font-size:.78rem;font-family:inherit;cursor:pointer;outline:none}
    .date-input:focus{border-color:rgba(78,158,245,.5)}
    .btn-refresh{background:rgba(78,158,245,.18);border:1px solid rgba(78,158,245,.3);
                 color:var(--blue);padding:.3rem .8rem;border-radius:var(--r6);
                 font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
    .btn-refresh:hover{background:rgba(78,158,245,.3)}
    .vps-badge{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);
               color:var(--green);border-radius:20px;padding:.15rem .75rem;
               font-size:.68rem;font-weight:700;white-space:nowrap}
    .header-back{margin-left:auto;color:var(--t3);text-decoration:none;
                 font-size:.75rem;white-space:nowrap;transition:color .15s}
    .header-back:hover{color:var(--t2)}

    /* ── KPI 栏 ── */
    .kpi-bar{display:grid;grid-template-columns:repeat(5,1fr);
             background:var(--surf);border-bottom:1px solid var(--border)}
    .kpi-cell{padding:.9rem 1.25rem;border-right:1px solid var(--border);
              display:flex;flex-direction:column;gap:3px}
    .kpi-cell:last-child{border-right:none}
    .kpi-label{font-size:.62rem;font-weight:700;color:var(--t3);
               text-transform:uppercase;letter-spacing:.05em}
    .kpi-value{font-size:1.55rem;font-weight:900;color:var(--t1);line-height:1}
    .kpi-sub{font-size:.62rem;color:var(--t3);margin-top:1px}
    .kpi-green .kpi-value{color:var(--green)}
    .kpi-blue  .kpi-value{color:var(--blue)}
    .kpi-amber .kpi-value{color:var(--amber)}
    .kpi-red   .kpi-value{color:var(--red)}

    /* ── VPS 排行条 ── */
    #rankStrip,#productStrip{background:var(--surf2);border-bottom:1px solid var(--border);
               padding:.6rem 1.5rem;display:none;align-items:center;gap:.5rem;overflow-x:auto}
    .rank-label{font-size:.62rem;font-weight:700;color:var(--t3);
                text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
    .rank-pills{display:flex;gap:.4rem;flex-wrap:nowrap}
    .rank-pill{display:inline-flex;align-items:center;gap:.35rem;
               padding:.25rem .65rem;border-radius:20px;white-space:nowrap;
               background:rgba(255,255,255,.05);border:1px solid var(--border2)}
    .rank-pill .medal{font-size:.7rem}
    .rank-pill .rname{font-size:.72rem;font-weight:600;color:var(--t2)}
    .rank-pill .ramt{font-size:.75rem;font-weight:800;color:var(--green)}

    /* ── 主内容区 ── */
    .page-body{padding:1.25rem 1.5rem 3rem}

    /* ── 工具栏 ── */
    .toolbar{display:flex;align-items:center;justify-content:space-between;
             gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
    .toolbar-left{display:flex;align-items:center;gap:.5rem}
    .store-count{font-size:.8rem;color:var(--t3);font-weight:600}
    .filter-group{display:flex;gap:.35rem;flex-wrap:wrap}
    .filter-btn{background:rgba(255,255,255,.04);border:1px solid var(--border2);
                color:var(--t3);padding:.25rem .65rem;border-radius:20px;
                font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
    .filter-btn:hover{border-color:rgba(78,158,245,.4);color:var(--t2)}
    .filter-btn.active{background:rgba(78,158,245,.18);border-color:rgba(78,158,245,.4);color:var(--blue)}
    .btn-add{display:inline-flex;align-items:center;gap:.35rem;
             padding:.35rem .9rem;background:rgba(37,99,235,.25);color:var(--blue);
             border:1px solid rgba(37,99,235,.4);border-radius:var(--r6);
             font-size:.75rem;font-weight:700;text-decoration:none;transition:background .15s;white-space:nowrap}
    .btn-add:hover{background:rgba(37,99,235,.4)}

    /* ── 卡片网格 ── */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.85rem}

    /* ── 卡片 ── */
    .card{background:var(--surf);border:1px solid var(--border);
          border-radius:var(--r12);overflow:hidden;transition:border-color .18s,box-shadow .18s}
    .card:hover{border-color:rgba(78,158,245,.25);box-shadow:0 4px 20px rgba(0,0,0,.35)}
    .card.no-data{background:rgba(19,24,42,.5);border-style:dashed;border-color:rgba(255,255,255,.05)}

    /* 卡片头部 */
    .card-head{padding:.8rem 1rem .65rem;display:flex;align-items:flex-start;
               justify-content:space-between;gap:.5rem}
    .card-name{font-size:.85rem;font-weight:700;color:var(--t1);line-height:1.3}
    .card-meta{font-size:.64rem;color:var(--t3);margin-top:2px;line-height:1.4}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;
           border-radius:20px;font-size:.62rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
    .badge-green{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
    .badge-blue{background:rgba(78,158,245,.12);color:var(--blue);border:1px solid rgba(78,158,245,.2)}
    .badge-gray{background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--border)}

    /* 三列指标条 */
    .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;
             border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .metric{padding:.6rem .5rem;text-align:center;position:relative}
    .metric+.metric::before{content:'';position:absolute;left:0;top:.5rem;bottom:.5rem;
                              width:1px;background:var(--border)}
    .metric-lab{font-size:.6rem;color:var(--t3);font-weight:600;
                text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
    .metric-val{font-size:1.1rem;font-weight:900;line-height:1}
    .metric-sub{font-size:.6rem;color:var(--t3);margin-top:2px}
    .v-green{color:var(--green)}
    .v-blue{color:var(--blue)}
    .v-amber{color:var(--amber)}
    .v-ink{color:var(--t1)}

    /* 激活条 */
    .act-row{display:grid;grid-template-columns:1fr 1fr 1fr;
             background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);padding:.5rem .75rem;gap:.5rem}
    .act-cell{display:flex;flex-direction:column;align-items:center;gap:1px}
    .act-lab{font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase}
    .act-val{font-size:.95rem;font-weight:800}

    /* 进店来源条 */
    .src-sec{padding:.65rem 1rem .5rem}
    .src-title{font-size:.58rem;font-weight:700;color:var(--t3);
               text-transform:uppercase;letter-spacing:.04em;margin-bottom:.45rem}
    .src-rows{display:flex;flex-direction:column;gap:.28rem}
    .src-row{display:grid;grid-template-columns:36px 1fr 28px;align-items:center;gap:.4rem}
    .src-name{font-size:.65rem;color:var(--t3);font-weight:600;text-align:right;white-space:nowrap}
    .src-track{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
    .src-fill{height:100%;border-radius:99px;transition:width .4s}
    .src-pct{font-size:.63rem;color:var(--t3);font-weight:600;text-align:right}

    /* 无数据提示 */
    .no-entry{padding:1rem 1rem;text-align:center;color:var(--t3);font-size:.78rem;
              border-top:1px solid var(--border)}
    .no-entry strong{color:var(--t2)}

    /* 卡片底栏 */
    .card-foot{display:flex;align-items:center;justify-content:space-between;
               padding:.5rem 1rem;border-top:1px solid var(--border);
               background:rgba(255,255,255,.015)}
    .foot-txt{font-size:.63rem;color:var(--t3)}
    .btn-entry{display:inline-flex;align-items:center;gap:.3rem;
               padding:.28rem .65rem;background:rgba(78,158,245,.18);color:var(--blue);
               border:1px solid rgba(78,158,245,.3);border-radius:var(--r6);
               font-size:.68rem;font-weight:700;text-decoration:none;transition:background .15s}
    .btn-entry:hover{background:rgba(78,158,245,.32)}
    .btn-entry.ghost{background:transparent;border-style:dashed}

    /* 空态 / 加载 */
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
               padding:4rem 1rem;color:var(--t3);gap:.75rem;text-align:center}
    .state-icon{font-size:2rem}
    .spin{width:2rem;height:2rem;border:3px solid rgba(255,255,255,.07);
          border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:860px){
      .kpi-bar{grid-template-columns:repeat(3,1fr)}
      .kpi-cell:nth-child(n+4){display:none}
    }
    @media(max-width:560px){
      .kpi-bar{grid-template-columns:1fr 1fr}
      .kpi-cell:nth-child(n+3){display:none}
      .card-grid{grid-template-columns:1fr}
      .page-body{padding:.85rem .85rem 2rem}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">🏪 <span>门店五件套</span></div>
  <div class="sep"></div>
  <div class="period-group" id="periodGroup">
    <button class="period-btn" data-p="day"     onclick="setPeriod('day')">日</button>
    <button class="period-btn" data-p="week"    onclick="setPeriod('week')">周</button>
    <button class="period-btn active" data-p="month"   onclick="setPeriod('month')">月</button>
    <button class="period-btn" data-p="quarter" onclick="setPeriod('quarter')">季</button>
  </div>
  <div class="sep"></div>
  <input type="date" class="date-input" id="anchorPicker" />
  <button class="btn-refresh" onclick="load()">刷新</button>
  <span class="vps-badge" id="vpsBadge" style="display:none"></span>
  <a href="/walkin-cockpit/" class="header-back">← 客流接待台</a>
</header>

<div id="kpiBar" class="kpi-bar" style="display:none">
  <div class="kpi-cell kpi-green">
    <div class="kpi-label">VPS Sell-out</div>
    <div class="kpi-value" id="k-sellout">—</div>
    <div class="kpi-sub" id="k-sellout-sub">本期真实销售额</div>
  </div>
  <div class="kpi-cell kpi-blue">
    <div class="kpi-label">累计激活</div>
    <div class="kpi-value" id="k-activated">—</div>
    <div class="kpi-sub" id="k-activated-sub">台 · 全部历史</div>
  </div>
  <div class="kpi-cell kpi-amber">
    <div class="kpi-label">待激活</div>
    <div class="kpi-value" id="k-notact">—</div>
    <div class="kpi-sub">已发货未激活</div>
  </div>
  <div class="kpi-cell">
    <div class="kpi-label">海外库存</div>
    <div class="kpi-value" id="k-stock">—</div>
    <div class="kpi-sub">台 · 所有经销商</div>
  </div>
  <div class="kpi-cell">
    <div class="kpi-label">已上报门店</div>
    <div class="kpi-value" id="k-reported">—</div>
    <div class="kpi-sub" id="k-total-sub">共 — 家</div>
  </div>
</div>

<!-- VPS 排行条（有数据时展开） -->
<div id="rankStrip">
  <span class="rank-label">Sell-out 排行</span>
  <div class="rank-pills" id="rankPills"></div>
</div>

<!-- 产品激活排行（有数据时展开） -->
<div id="productStrip">
  <span class="rank-label">产品激活排行</span>
  <div class="rank-pills" id="productPills"></div>
</div>

<div class="page-body">
  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="store-count" id="storeCountLabel"></span>
      <div class="filter-group" id="filterGroup" style="display:none">
        <button class="filter-btn active" onclick="setFilter('all')" data-f="all">全部</button>
        <button class="filter-btn" onclick="setFilter('reported')" data-f="reported">已上报</button>
        <button class="filter-btn" onclick="setFilter('norep')" data-f="norep">未上报</button>
        <button class="filter-btn" onclick="setFilter('vps')" data-f="vps">有VPS数据</button>
      </div>
    </div>
    <a href="/walkin-submit/" class="btn-add" id="entryBtn">+ 录入五件套</a>
  </div>
  <div id="cardGrid"><div class="state-box"><div class="spin"></div><span>加载中…</span></div></div>
</div>

<script>
var storeList = [];
var summaryData = null;
var vpsData = null;
var activationData = null;
var currentFilter = 'all';

// ── 期间工具 ────────────────────────────────────────────────────────────────
function _fmt(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd}
function _parse(s){var p=String(s||'').split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function getPeriodRange(anchor,period){
  var d=_parse(anchor||new Date().toISOString().slice(0,10)),y=d.getFullYear(),m=d.getMonth();
  if(period==='day')return{start:anchor,end:anchor,label:anchor};
  if(period==='week'){var dow=d.getDay(),dToMon=dow===0?-6:1-dow,mon=new Date(d),sun=new Date(d);mon.setDate(d.getDate()+dToMon);sun.setDate(mon.getDate()+6);return{start:_fmt(mon),end:_fmt(sun),label:_fmt(mon)+'~'+_fmt(sun).slice(5)};}
  if(period==='month'){var last=new Date(y,m+1,0).getDate();return{start:_fmt(new Date(y,m,1)),end:_fmt(new Date(y,m,last)),label:y+'年'+(m+1)+'月'};}
  if(period==='quarter'){var q=Math.floor(m/3),qsm=q*3,qem=qsm+2,qLast=new Date(y,qem+1,0).getDate();return{start:_fmt(new Date(y,qsm,1)),end:_fmt(new Date(y,qem,qLast)),label:y+'Q'+(q+1)};}
  return getPeriodRange(anchor,'month');
}

// ── 初始化 ──────────────────────────────────────────────────────────────────
var _qs = new URLSearchParams(location.search);
currentFilter = ['all','reported','norep','vps'].indexOf(_qs.get('filter'))>=0?_qs.get('filter'):'all';
var currentPeriod = _qs.get('period') || (typeof sessionStorage!=='undefined'&&sessionStorage.getItem('pdca_period')) || 'month';
var currentAnchor = _qs.get('date') || new Date().toISOString().slice(0,10);

(function(){
  document.getElementById('anchorPicker').value = currentAnchor;
  document.querySelectorAll('.period-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.p === currentPeriod);
  });
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.f === currentFilter);
  });
})();

function setPeriod(p){
  currentPeriod=p;
  if(typeof sessionStorage!=='undefined')sessionStorage.setItem('pdca_period',p);
  document.querySelectorAll('.period-btn').forEach(function(btn){btn.classList.toggle('active',btn.dataset.p===p)});
  load();
}
document.getElementById('anchorPicker').addEventListener('change',function(){currentAnchor=this.value;load();});

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.f===f)});
  renderCards();
}

// ── 认证 + 门店列表 ─────────────────────────────────────────────────────────
fetch('/api/auth/me',{credentials:'include'})
  .then(function(r){return r.ok?r.json():null})
  .then(function(me){
    if(!me){location.href='/login?next=/store-five-kit/';return}
    if(me.role==='viewer'){document.getElementById('entryBtn').style.display='none'}
    return fetch('/api/my-stores',{credentials:'include'})
      .then(function(r){return r.ok?r.json():[]})
      .then(function(s){storeList=s;load()})
  })
  .catch(function(){showError('无法连接服务，请刷新重试')});

// ── 数据加载 ────────────────────────────────────────────────────────────────
function load(){
  var range=getPeriodRange(currentAnchor,currentPeriod);
  var qs='start='+encodeURIComponent(range.start)+'&end='+encodeURIComponent(range.end);
  document.getElementById('cardGrid').innerHTML='<div class="state-box"><div class="spin"></div><span>加载中…</span></div>';
  document.getElementById('kpiBar').style.display='none';
  document.getElementById('rankStrip').style.display='none';
  document.getElementById('filterGroup').style.display='none';
  document.getElementById('k-sellout-sub').textContent=range.label+' 真实销售额';
  summaryData=null;vpsData=null;activationData=null;

  var p1=fetch('/api/walkin-metrics/summary?'+qs,{credentials:'include',cache:'no-store'})
    .then(function(r){return r.ok?r.json():null}).catch(function(){return null});
  var p2=fetch('/api/vps/dealer-sales?'+qs,{credentials:'include',cache:'no-store'})
    .then(function(r){return r.ok?r.json():null}).catch(function(){return null});
  var p3=fetch('/api/vps/dealer-activation',{credentials:'include',cache:'no-store'})
    .then(function(r){return r.ok?r.json():null}).catch(function(){return null});

  Promise.all([p1,p2,p3]).then(function(res){
    summaryData=res[0];vpsData=res[1];activationData=res[2];
    renderAll(range);
  });
}

function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_\.,\(\)&']/g,'')}
function buildMap(arr){
  var m={};
  if(!arr)return m;
  arr.forEach(function(d){m[norm(d.dealer_name)]=d});
  return m;
}
function lookup(name,map){
  if(!map)return null;
  var k=norm(name);
  if(map[k])return map[k];
  var keys=Object.keys(map);
  for(var i=0;i<keys.length;i++){
    if(keys[i].indexOf(k)!==-1||k.indexOf(keys[i])!==-1)return map[keys[i]];
  }
  return null;
}

// ── 渲染全部 ────────────────────────────────────────────────────────────────
function renderAll(range){
  var d=summaryData,vps=vpsData,act=activationData;
  window._activeRange=range||null;
  var actUsable=act&&act.available!==false;

  // KPI 数字
  var vpsTotal=0;
  if(vps&&vps.dealers)vps.dealers.forEach(function(x){vpsTotal+=x.sell_out_yuan||0});
  var totAct=0,totNot=0;
  if(actUsable&&act.dealers)act.dealers.forEach(function(x){totAct+=x.activated||0;totNot+=x.not_activated||0});
  var stock=actUsable&&act.total_overseas_stock!=null?act.total_overseas_stock:null;
  var reported=d&&d.by_dealer?d.by_dealer.length:0;

  document.getElementById('kpiBar').style.display='';
  document.getElementById('k-sellout').textContent=vps&&vps.dealers?(vpsTotal/10000).toFixed(1)+' 万':'—';
  document.getElementById('k-activated').textContent=actUsable?totAct:'—';
  document.getElementById('k-notact').textContent=actUsable?totNot:'—';
  document.getElementById('k-stock').textContent=stock==null?'—':stock;
  document.getElementById('k-reported').textContent=reported;
  document.getElementById('k-total-sub').textContent='共 '+storeList.length+' 家';
  document.getElementById('k-activated-sub').textContent='台 · 全部历史';
  if(actUsable&&act.total_activated){
    document.getElementById('k-activated-sub').textContent=
      '本地 '+(act.total_local_activated||0)+'('+(act.overall_local_rate||0)+'%) · 异地 '+(act.total_remote_activated||0);
  }else if(act&&act.available===false){
    document.getElementById('k-activated-sub').textContent=act.detail||'激活设备数据暂时不可用';
  }

  if(vps||actUsable){
    var badge=document.getElementById('vpsBadge');
    badge.style.display='';
    badge.textContent=(range?range.label:'')+(act&&act.stale?' · 激活数据为缓存':' · VPS 数据');
  }

  // VPS 排行条
  if(vps&&vps.dealers&&vps.dealers.length){
    var strip=document.getElementById('rankStrip');
    strip.style.display='flex';
    var medals=['🥇','🥈','🥉'];
    var pills=vps.dealers.slice(0,10).map(function(dd,i){
      var wan=(dd.sell_out_yuan/10000).toFixed(1);
      return '<div class="rank-pill">'
        +'<span class="medal">'+(medals[i]||((i+1)+'.'))+' </span>'
        +'<span class="rname">'+esc(dd.dealer_name)+'</span>'
        +'<span class="ramt">'+wan+' 万</span>'
        +'</div>';
    }).join('');
    document.getElementById('rankPills').innerHTML=pills;
  }

  // 产品激活排行
  if(act&&act.products&&act.products.length){
    var pstrip=document.getElementById('productStrip');
    pstrip.style.display='flex';
    var ppills=act.products.slice(0,10).map(function(p,i){
      return '<div class="rank-pill">'
        +'<span class="medal">'+(i+1)+'. </span>'
        +'<span class="rname">'+esc(p.product_name)+'</span>'
        +'<span class="ramt">'+(p.activated||0)+' 台</span>'
        +'</div>';
    }).join('');
    document.getElementById('productPills').innerHTML=ppills;
  }

  // 显示过滤器
  document.getElementById('filterGroup').style.display='flex';

  // 构建数据索引
  window._vpsMap=buildMap(vps&&vps.dealers);
  window._actMap=buildMap(act&&act.dealers);
  window._dealerMap={};
  if(d&&d.by_dealer)d.by_dealer.forEach(function(s){window._dealerMap[s.dealer_id]=s});

  // 构建额外 VPS-only 门店列表
  window._vpsExtras=[];
  if(vps&&vps.dealers){
    vps.dealers.forEach(function(vd){
      var inList=storeList.some(function(st){return lookup(st.name,buildMap([vd]))!==null});
      if(!inList){
        window._vpsExtras.push({store_id:norm(vd.dealer_name),name:vd.dealer_name,region:'',country:'',dealer_level:''});
      }
    });
  }

  renderCards();
}

// ── 渲染卡片 ────────────────────────────────────────────────────────────────
function renderCards(){
  var vpsMap=window._vpsMap||{};
  var actMap=window._actMap||{};
  var dealerMap=window._dealerMap||{};
  var extras=window._vpsExtras||[];

  var allStores=storeList.concat(extras);

  var filtered=allStores.filter(function(store){
    var sd=dealerMap[store.store_id]||null;
    var vd=lookup(store.name,vpsMap);
    var hasKit=!!sd;
    var hasVps=vd&&(vd.sell_out_yuan>0||vd.qty>0);
    if(currentFilter==='reported')return hasKit;
    if(currentFilter==='norep')return !hasKit;
    if(currentFilter==='vps')return hasVps;
    return true;
  });

  document.getElementById('storeCountLabel').textContent='共 '+allStores.length+' 家门店 · 显示 '+filtered.length+' 家';

  if(!filtered.length){
    document.getElementById('cardGrid').innerHTML='<div class="state-box"><div class="state-icon">🏪</div><span>当前筛选暂无数据</span></div>';
    return;
  }

  var html=filtered.map(function(store){
    return renderCard(store,dealerMap[store.store_id]||null,lookup(store.name,vpsMap),lookup(store.name,actMap));
  }).join('');
  document.getElementById('cardGrid').innerHTML='<div class="card-grid">'+html+'</div>';
}

// ── 单张卡片 ────────────────────────────────────────────────────────────────
function renderCard(store,sd,vd,ad){
  var hasKit=!!sd;
  var hasVps=vd&&(vd.sell_out_yuan>0||vd.qty>0);
  var hasAct=ad&&(ad.activated>0||ad.not_activated>0);
  var hasSome=hasKit||hasVps||hasAct;
  var url='/walkin-submit/?store='+encodeURIComponent(store.store_id);
  var meta=[store.country,store.region,store.dealer_level].filter(Boolean).join(' · ');

  var badge=hasKit
    ?'<span class="badge badge-green">✓ 已上报</span>'
    :hasVps?'<span class="badge badge-blue">VPS</span>'
    :'<span class="badge badge-gray">未上报</span>';

  // 三列核心指标
  var selloutVal=hasVps?(vd.sell_out_yuan/10000).toFixed(2)+' 万':'—';
  var selloutSub=hasVps?(vd.qty||0)+' 台':'';
  var actVal=hasAct?(ad.activated||0):'—';
  var actRate=hasAct&&((ad.activated||0)+(ad.not_activated||0))>0
    ?Math.round((ad.activated||0)/((ad.activated||0)+(ad.not_activated||0))*100)+'%':'—';
  var visitsVal=hasKit?sd.total_visits:'—';
  var dealSub=hasKit?'成交 '+(sd.deal_count||0)+' 台':'';

  var metrics=
    '<div class="metrics">'
    +'<div class="metric"><div class="metric-lab">Sell-out</div>'
    +'<div class="metric-val v-green">'+esc(String(selloutVal))+'</div>'
    +(selloutSub?'<div class="metric-sub">'+esc(selloutSub)+'</div>':'')+'</div>'
    +'<div class="metric"><div class="metric-lab">激活 / 率</div>'
    +'<div class="metric-val v-blue">'+esc(String(actVal))+'</div>'
    +'<div class="metric-sub">'+esc(String(actRate))+'</div></div>'
    +'<div class="metric"><div class="metric-lab">'+esc((window._activeRange&&window._activeRange.label)||'所选期间')+'进店</div>'
    +'<div class="metric-val v-ink">'+esc(String(visitsVal))+'</div>'
    +(dealSub?'<div class="metric-sub">'+esc(dealSub)+'</div>':'')+'</div>'
    +'</div>';

  // 激活明细条
  var actRow='';
  if(hasAct){
    var notAct=ad.not_activated||0;
    var total=(ad.activated||0)+notAct;
    var pct=total>0?Math.round((ad.activated||0)/total*100)+'%':'—';
    actRow='<div class="act-row">'
      +'<div class="act-cell"><div class="act-lab">已激活</div><div class="act-val v-green">'+(ad.activated||0)+'</div></div>'
      +'<div class="act-cell"><div class="act-lab">未激活</div><div class="act-val v-amber">'+notAct+'</div></div>'
      +'<div class="act-cell"><div class="act-lab">激活率</div><div class="act-val v-blue">'+esc(pct)+'</div></div>'
      +'</div>';
    if(ad.activated>0){
      actRow+='<div class="act-row">'
        +'<div class="act-cell"><div class="act-lab">本地激活</div><div class="act-val v-green">'+(ad.local_activated||0)+'</div></div>'
        +'<div class="act-cell"><div class="act-lab">异地激活</div><div class="act-val v-amber">'+(ad.remote_activated||0)+'</div></div>'
        +'<div class="act-cell"><div class="act-lab">本地率</div><div class="act-val v-blue">'+(ad.local_activation_rate||0)+'%</div></div>'
        +'</div>';
    }
  }

  // 进店来源条
  var srcHtml='';
  if(hasKit){
    var srcs=[
      {n:'Walkin',v:sd.walkin||0,c:'#475569'},
      {n:'异业',v:sd.cross||0,c:'#d97706'},
      {n:'线上',v:sd.online||0,c:'#0891b2'},
      {n:'招聘',v:sd.recruit||0,c:'#2563eb'},
      {n:'存量',v:sd.existing||0,c:'#7c3aed'},
    ];
    var tot=sd.total_visits||1;
    var rows=srcs.filter(function(s){return s.v>0}).map(function(s){
      var p=Math.round(s.v/tot*100);
      return '<div class="src-row">'
        +'<div class="src-name">'+esc(s.n)+'</div>'
        +'<div class="src-track"><div class="src-fill" style="width:'+p+'%;background:'+s.c+'"></div></div>'
        +'<div class="src-pct">'+p+'%</div>'
        +'</div>';
    }).join('');
    if(rows){
      srcHtml='<div class="src-sec"><div class="src-title">进店来源</div>'
        +'<div class="src-rows">'+rows+'</div></div>';
    }
  }

  // 无数据态
  var noData='';
  if(!hasSome){
    noData='<div class="no-entry">'+esc((window._activeRange&&window._activeRange.label)||'所选期间')+'暂无数据<br><strong>点击录入开始填报</strong></div>';
  }

  var footTxt=hasVps
    ?'Sell-out: ¥'+(vd.sell_out_yuan/10000).toFixed(2)+'万'
    :'暂无销售记录';

  return '<div class="card'+(hasSome?'':' no-data')+'">'
    +'<div class="card-head">'
    +'<div><div class="card-name">'+esc(store.name)+'</div>'+(meta?'<div class="card-meta">'+esc(meta)+'</div>':'')+'</div>'
    +badge+'</div>'
    +metrics
    +actRow
    +srcHtml
    +noData
    +'<div class="card-foot">'
    +'<span class="foot-txt">'+esc(footTxt)+'</span>'
    +'<a href="'+url+'" class="btn-entry'+(hasKit?'':' ghost')+'">✏ 录入</a>'
    +'</div></div>';
}

function showError(msg){
  document.getElementById('cardGrid').innerHTML='<div class="state-box"><div class="state-icon">⚠️</div><span>'+esc(msg)+'</span></div>';
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
